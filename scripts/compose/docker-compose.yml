# Production compose — used by deploy-api.yml CI workflow on the VPS.
# Build from repo root: docker compose --profile backend up -d

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: apps/frontend/.env
        required: false
    profiles: [frontend, all]
    restart: unless-stopped

  kortix-api:
    build:
      context: .
      dockerfile: kortix-api/Dockerfile
      args:
        SERVICE: kortix-api
    ports:
      - "8008:8008"
    env_file:
      - path: kortix-api/.env
        required: false
    profiles: [backend, all]
    restart: unless-stopped
