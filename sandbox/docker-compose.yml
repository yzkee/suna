# Sandbox Docker Compose — single instance, fixed ports.
#
# This mirrors the local Docker provider behavior in kortix-api:
# - container name is always `kortix-sandbox`
# - host ports are stable so the frontend never chases random mappings
#
# Default host port range: 14000-14006
# If you already have something running on that range, edit the mappings below.

services:
  desktop:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: kortixmarko/sandbox:${SANDBOX_VERSION:-latest}
    container_name: kortix-sandbox
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox ${SANDBOX_NAME:-default}
      - OPENCODE_CONFIG_DIR=/opt/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - LSS_DIR=/workspace/.lss
      - KORTIX_WORKSPACE=/workspace
      # Kortix Master
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-admin}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-changeme}
      - KORTIX_API_URL=${KORTIX_API_URL:-https://api.kortix.ai/v1/router}
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - SANDBOX_ID=${SANDBOX_ID:-local}
      - PROJECT_ID=${PROJECT_ID:-local}
      - ENV_MODE=${ENV_MODE:-local}
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - secrets_data:/app/secrets
    ports:
      - "14000:8000"  # Kortix Master (proxy entry point)
      - "14001:3111"  # OpenCode Web UI
      - "14002:6080"  # Desktop (noVNC)
      - "14003:6081"  # Desktop (HTTPS)
      - "14004:3210"  # Presentation Viewer
      - "14005:9223"  # Agent Browser Stream (WS)
      - "14006:9224"  # Agent Browser Viewer
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  workspace:
  secrets_data:
