# Sandbox Docker Compose — supports multiple concurrent instances.
#
# Usage:
#   docker compose up -d                          # single sandbox (default)
#   SANDBOX_NAME=dev2 docker compose up -d        # second sandbox (unique name)
#   docker compose ps                             # see assigned ports
#
# Each sandbox gets Docker-assigned random host ports for all services.
# After startup, inspect assigned ports with:
#   docker compose port desktop 8000              # → 0.0.0.0:<random>
#   docker compose port desktop 6080              # → 0.0.0.0:<random>

services:
  desktop:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: kortix-sandbox:${SANDBOX_VERSION:-0.4.3}
    # No container_name — allows multiple instances via --project-name / COMPOSE_PROJECT_NAME
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox ${SANDBOX_NAME:-default}
      - OPENCODE_CONFIG_DIR=/opt/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - LSS_DIR=/workspace/.lss
      - KORTIX_WORKSPACE=/workspace
      # Kortix Master
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-admin}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-changeme}
      - KORTIX_API_URL=${KORTIX_API_URL:-https://api.kortix.ai/router}
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - SANDBOX_ID=${SANDBOX_ID:-local}
      - PROJECT_ID=${PROJECT_ID:-local}
      - ENV_MODE=${ENV_MODE:-local}
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - secrets_data:/app/secrets
    ports:
      # Dynamic host port assignment — Docker picks random available ports.
      # This allows running multiple sandbox instances simultaneously.
      - "6080"    # Desktop (noVNC)
      - "6081"    # Desktop (HTTPS)
      - "3111"    # OpenCode Web UI
      - "3210"    # Presentation Viewer
      - "8000"    # Kortix Master (proxy entry point)
      - "9223"    # Agent Browser Stream (WS)
      - "9224"    # Agent Browser Viewer
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  workspace:
  secrets_data:
