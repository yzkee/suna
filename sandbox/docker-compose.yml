# Sandbox Docker Compose — single instance, fixed ports.
#
# This mirrors the local Docker provider behavior in kortix-api:
# - container name is always `kortix-sandbox`
# - host ports are stable so the frontend never chases random mappings
#
# Default host port range: 14000-14008
# If you already have something running on that range, edit the mappings below.
#
# ── Networking ──────────────────────────────────────────────────────────────
#
# Two dev scenarios:
#
#   1. API running on host (pnpm run dev)  →  default, no extra config needed
#      Sandbox reaches API via host.docker.internal:8008
#
#   2. API running in Docker (kortix stack) →  set KORTIX_NETWORK to join
#      the API's Docker network so sandbox can use Docker DNS (kortix-api:8008)
#
#      KORTIX_NETWORK=kortix_default docker compose up
#
# ── Volume ──────────────────────────────────────────────────────────────────
#
# Single persistent volume mounted at /workspace (user data) and /config
# (linuxserver.io home dir for abc user). Secrets stored under /workspace/.secrets.
#
# ────────────────────────────────────────────────────────────────────────────

services:
  desktop:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: kortix/computer:${SANDBOX_VERSION:-latest}
    container_name: kortix-sandbox
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    extra_hosts:
      # Ensures host.docker.internal works on Linux too (macOS/Windows have it built-in)
      - "host.docker.internal:host-gateway"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox ${SANDBOX_NAME:-default}
      - OPENCODE_CONFIG_DIR=/opt/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - LSS_DIR=/workspace/.lss
      - KORTIX_WORKSPACE=/workspace
      - SECRET_FILE_PATH=/workspace/.secrets/.secrets.json
      - SALT_FILE_PATH=/workspace/.secrets/.salt
      # Default: API on host (pnpm run dev). Override for Docker-to-Docker.
      - KORTIX_API_URL=${KORTIX_API_URL:-http://host.docker.internal:8008}
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      - SANDBOX_ID=${SANDBOX_ID:-local}
      - PROJECT_ID=${PROJECT_ID:-local}
      - ENV_MODE=${ENV_MODE:-local}
    env_file:
      - .env
    volumes:
      - sandbox_data:/workspace
      - sandbox_data:/config
    ports:
      - "127.0.0.1:14000:8000"  # Kortix Master (proxy entry point)
      - "127.0.0.1:14001:3111"  # OpenCode Web UI
      - "127.0.0.1:14002:6080"  # Desktop (noVNC)
      - "127.0.0.1:14003:6081"  # Desktop (HTTPS)
      - "127.0.0.1:14004:3210"  # Presentation Viewer
      - "127.0.0.1:14005:9223"  # Agent Browser Stream (WS)
      - "127.0.0.1:14006:9224"  # Agent Browser Viewer
      - "127.0.0.1:14007:22"    # SSH
      - "127.0.0.1:14008:3211"  # Static Web Server (standalone HTML/assets)
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      # Returns 200 only when OpenCode is reachable; 503 while starting.
      # curl -f treats 503 as failure, so Docker marks the container as
      # "starting" until OpenCode is ready — exactly what we want.
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sandbox_data:
