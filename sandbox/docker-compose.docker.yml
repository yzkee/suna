# Override: join the Kortix API Docker network.
#
# Use when kortix-api is running in Docker (not pnpm run dev on host).
# The sandbox joins the API's network so Docker DNS resolves "kortix-api".
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.docker.yml up
#
# Or with custom network name:
#   KORTIX_NETWORK=computer_default docker compose -f docker-compose.yml -f docker-compose.docker.yml up

services:
  desktop:
    environment:
      - KORTIX_API_URL=http://kortix-api:8008
    networks:
      - default
      - kortix

networks:
  kortix:
    name: ${KORTIX_NETWORK:-kortix_default}
    external: true
