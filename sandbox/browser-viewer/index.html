<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Browser — Kortix</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #111111;
      --bg-elevated: #181818;
      --border: #222222;
      --border-subtle: #1a1a1a;
      --text: #e8e8e8;
      --text-secondary: #888888;
      --text-tertiary: #555555;
      --text-dim: #333333;
      --accent: #ffffff;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-pill: 100px;
    }

    body {
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: var(--text); padding: 12px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; width: 100%; max-width: 1300px;
    }

    .logo-group {
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap; flex-shrink: 0;
    }

    .logo-group svg {
      width: 18px; height: 18px; opacity: 0.7;
    }

    .logo-group h1 {
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      letter-spacing: -0.01em;
    }

    .header-divider {
      width: 1px; height: 16px; background: var(--border);
      flex-shrink: 0;
    }

    /* ── Session Tabs ─────────────────────────────────────────── */
    #session-tabs {
      display: flex; gap: 4px; overflow-x: auto; flex: 1;
      scrollbar-width: none;
    }
    #session-tabs::-webkit-scrollbar { display: none; }

    .tab {
      font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm);
      background: transparent; border: 1px solid transparent; color: var(--text-tertiary);
      cursor: pointer; white-space: nowrap; transition: all 0.15s ease;
      display: flex; align-items: center; gap: 6px;
      font-weight: 450; letter-spacing: -0.01em;
    }
    .tab:hover { color: var(--text-secondary); background: var(--bg-elevated); }
    .tab.active {
      background: var(--bg-elevated); border-color: var(--border);
      color: var(--text);
    }
    .tab.stale { opacity: 0.4; }

    .tab .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0;
    }
    .tab .dot.live { background: var(--green); box-shadow: 0 0 6px rgba(34, 197, 94, 0.4); }
    .tab .dot.dead { background: var(--text-dim); }
    .tab .dot.stale { background: var(--amber); }

    .tab .label {
      max-width: 180px; overflow: hidden; text-overflow: ellipsis;
    }

    .tab .badge {
      font-size: 9px; padding: 1px 6px; border-radius: var(--radius-pill);
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-tertiary); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.03em;
    }

    .tab .close-btn {
      font-size: 14px; color: var(--text-dim); cursor: pointer; margin-left: 2px;
      line-height: 1; transition: color 0.15s;
    }
    .tab .close-btn:hover { color: var(--red); }

    /* ── Status Badge ─────────────────────────────────────────── */
    #status {
      font-size: 11px; padding: 4px 10px; border-radius: var(--radius-pill);
      background: var(--bg-surface); border: 1px solid var(--border);
      white-space: nowrap; font-weight: 500; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    #status::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      flex-shrink: 0;
    }
    #status.connected { color: var(--green); }
    #status.connected::before { background: var(--green); box-shadow: 0 0 6px rgba(34, 197, 94, 0.4); }
    #status.disconnected { color: var(--red); }
    #status.disconnected::before { background: var(--red); }
    #status.connecting { color: var(--amber); }
    #status.connecting::before { background: var(--amber); animation: pulse-dot 1.5s ease-in-out infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #frame-info {
      font-size: 10px; color: var(--text-dim); white-space: nowrap;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-weight: 400; letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    /* ── Viewport ─────────────────────────────────────────────── */
    #viewport-wrap {
      position: relative; background: #000; border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      max-width: 95vw; max-height: calc(100vh - 70px);
    }

    canvas {
      display: block; width: 100%; height: 100%;
      cursor: default;
    }

    /* ── Empty State ──────────────────────────────────────────── */
    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; padding: 80px 40px;
      text-align: center;
    }

    #empty-state .icon-wrap {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    #empty-state .icon-wrap svg {
      width: 24px; height: 24px; opacity: 0.5;
    }

    #empty-state .icon-badge {
      position: absolute; bottom: -4px; right: -4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }

    #empty-state .icon-badge svg {
      width: 10px; height: 10px; opacity: 0.35;
    }

    #empty-state h2 {
      font-size: 14px; font-weight: 600; color: var(--text);
      letter-spacing: -0.02em;
    }

    #empty-state .hint {
      font-size: 13px; max-width: 360px; line-height: 1.6;
      color: var(--text-tertiary);
    }

    #empty-state .cmd-block {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-radius: 8px;
      background: var(--bg-elevated); border: 1px solid var(--border);
    }

    #empty-state .cmd-block .cmd-icon {
      width: 14px; height: 14px; opacity: 0.3; flex-shrink: 0;
    }

    #empty-state .cmd-block code {
      font-size: 12px; color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-group">
      <!-- Kortix Symbol (inline SVG) -->
      <svg viewBox="0 0 30 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M25.5614 24.916H29.8268C29.8268 19.6306 26.9378 15.0039 22.6171 12.4587C26.9377 9.91355 29.8267 5.28685 29.8267 0.00146484H25.5613C25.5613 5.00287 21.8906 9.18692 17.0654 10.1679V0.00146484H12.8005V10.1679C7.9526 9.20401 4.3046 5.0186 4.3046 0.00146484H0.0391572C0.0391572 5.28685 2.92822 9.91355 7.24884 12.4587C2.92818 15.0039 0.0390625 19.6306 0.0390625 24.916H4.30451C4.30451 19.8989 7.95259 15.7135 12.8005 14.7496V24.9206H17.0654V14.7496C21.9133 15.7134 25.5614 19.8989 25.5614 24.916Z" fill="white"/>
      </svg>
      <h1>Agent Browser</h1>
    </div>

    <div class="header-divider"></div>

    <div id="session-tabs"></div>
    <div id="status" class="connecting">connecting…</div>
    <div id="frame-info"></div>
  </header>

  <div id="viewport-wrap">
    <div id="empty-state">
      <div class="icon-wrap">
        <!-- Kortix Symbol -->
        <svg viewBox="0 0 30 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M25.5614 24.916H29.8268C29.8268 19.6306 26.9378 15.0039 22.6171 12.4587C26.9377 9.91355 29.8267 5.28685 29.8267 0.00146484H25.5613C25.5613 5.00287 21.8906 9.18692 17.0654 10.1679V0.00146484H12.8005V10.1679C7.9526 9.20401 4.3046 5.0186 4.3046 0.00146484H0.0391572C0.0391572 5.28685 2.92822 9.91355 7.24884 12.4587C2.92818 15.0039 0.0390625 19.6306 0.0390625 24.916H4.30451C4.30451 19.8989 7.95259 15.7135 12.8005 14.7496V24.9206H17.0654V14.7496C21.9133 15.7134 25.5614 19.8989 25.5614 24.916Z" fill="white"/>
        </svg>
        <div class="icon-badge">
          <!-- Globe icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>
          </svg>
        </div>
      </div>

      <h2>No browser session active</h2>

      <div class="hint">
        Start a session from the sandbox terminal to view the agent's browser in real-time.
      </div>

      <div class="cmd-block">
        <!-- Terminal icon -->
        <svg class="cmd-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
        <code>agent-browser --session kortix open https://example.com</code>
      </div>
    </div>
    <canvas id="viewport" width="1280" height="720" style="display:none" tabindex="0"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('viewport');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const frameInfo = document.getElementById('frame-info');
    const emptyState = document.getElementById('empty-state');
    const tabsEl = document.getElementById('session-tabs');

    const PRIMARY_SESSION = 'kortix';
    let ws = null;
    let frameCount = 0;
    let lastFrameTime = 0;
    let activePort = 9223;
    let activeSession = PRIMARY_SESSION;
    let sessions = [];
    let previousSessionNames = new Set();

    // ── Proxy detection ──────────────────────────────────────────
    const PREVIEW_PATH_RE = /^(.*\/preview\/[^/]+)\/\d+/;
    const proxyMatch = window.location.pathname.match(PREVIEW_PATH_RE);
    const proxyBase = proxyMatch ? proxyMatch[1] : null;
    const isProxied = !!proxyBase;
    const proxyToken = isProxied ? new URLSearchParams(window.location.search).get('token') : null;

    // Track which sessions have received frames recently (for stale detection)
    let sessionLastFrame = {};
    const STALE_THRESHOLD_MS = 10000;

    // ── URL parameter: ?session=name ─────────────────────────────
    function getUrlSession() {
      const params = new URLSearchParams(window.location.search);
      return params.get('session');
    }

    function setUrlSession(name) {
      const url = new URL(window.location);
      url.searchParams.set('session', name);
      window.history.replaceState({}, '', url);
    }

    const urlSession = getUrlSession();
    if (urlSession) {
      activeSession = urlSession;
    }

    // ── Session discovery ─────────────────────────────────────────
    async function pollSessions() {
      try {
        const sessionsUrl = isProxied
          ? `${proxyBase}/9224/sessions${proxyToken ? '?token=' + encodeURIComponent(proxyToken) : ''}`
          : '/sessions';
        const res = await fetch(sessionsUrl);
        const newSessions = await res.json();
        const newNames = new Set(newSessions.map(s => s.name));

        if (!urlSession) {
          for (const s of newSessions) {
            if (!previousSessionNames.has(s.name) && previousSessionNames.size > 0) {
              activeSession = s.name;
              activePort = s.port;
              setUrlSession(s.name);
              reconnect();
            }
          }
        }

        if (urlSession && newNames.has(urlSession) && !previousSessionNames.has(urlSession)) {
          const target = newSessions.find(s => s.name === urlSession);
          if (target) {
            activeSession = target.name;
            activePort = target.port;
            reconnect();
          }
        }

        previousSessionNames = newNames;
        sessions = newSessions;

        const active = sessions.find(s => s.name === activeSession);
        if (active && active.port !== activePort) {
          activePort = active.port;
          reconnect();
        }
      } catch(e) {
        sessions = [];
      }
      renderTabs();
    }

    function renderTabs() {
      const list = sessions.length > 0 ? sessions : [{ name: PRIMARY_SESSION, port: 9223 }];
      const now = Date.now();

      const sorted = [...list].sort((a, b) => {
        if (a.name === PRIMARY_SESSION) return -1;
        if (b.name === PRIMARY_SESSION) return 1;
        return a.name.localeCompare(b.name);
      });

      tabsEl.innerHTML = sorted.map(s => {
        const isActive = s.name === activeSession;
        const isConnected = connected && s.port === activePort && isActive;
        const isPrimary = s.name === PRIMARY_SESSION;
        const lastFrame = sessionLastFrame[s.name] || 0;
        const isStale = lastFrame > 0 && (now - lastFrame) > STALE_THRESHOLD_MS;
        const dotClass = isConnected ? 'live' : (isStale ? 'stale' : 'dead');
        const tabClass = 'tab' + (isActive ? ' active' : '') + (isStale && !isActive ? ' stale' : '');

        let label = s.name;
        let badge = '';
        if (isPrimary) {
          badge = '<span class="badge">primary</span>';
        }

        return `<div class="${tabClass}" data-port="${s.port}" data-name="${s.name}">` +
          `<span class="dot ${dotClass}"></span>` +
          `<span class="label">${label}</span>` +
          badge +
          `</div>`;
      }).join('');

      tabsEl.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const port = parseInt(tab.dataset.port, 10);
          const name = tab.dataset.name;
          if (port !== activePort || name !== activeSession) {
            activePort = port;
            activeSession = name;
            frameCount = 0;
            lastFrameTime = 0;
            setUrlSession(name);
            canvas.style.display = 'none';
            emptyState.style.display = '';
            emptyState.querySelector('h2').textContent = 'Connecting…';
            emptyState.querySelector('.hint').textContent =
              `Switching to session ${name}`;
            reconnect();
            renderTabs();
          }
        });
      });
    }

    // ── Connection (WS direct or SSE proxied) ─────────────────────
    let connected = false;
    let eventSource = null;

    function reconnect() {
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      if (eventSource) { eventSource.close(); eventSource = null; }
      connected = false;
      connect();
    }

    function handleMessage(raw) {
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'frame' && msg.data) {
          frameCount++;
          const now = performance.now();
          const fps = lastFrameTime ? Math.round(1000 / (now - lastFrameTime)) : 0;
          lastFrameTime = now;
          sessionLastFrame[activeSession] = Date.now();

          const img = new Image();
          img.onload = () => {
            if (canvas.width !== img.width || canvas.height !== img.height) {
              canvas.width = img.width;
              canvas.height = img.height;
            }
            ctx.drawImage(img, 0, 0);
            if (canvas.style.display === 'none') {
              canvas.style.display = 'block';
              emptyState.style.display = 'none';
            }
            frameInfo.textContent = `${img.width}×${img.height}  ${fps}fps  #${frameCount}`;
          };
          img.src = 'data:image/jpeg;base64,' + msg.data;
        }
      } catch (e) {}
    }

    function connect() {
      statusEl.textContent = 'connecting…';
      statusEl.className = 'connecting';

      if (isProxied) {
        const tokenParam = proxyToken ? '&token=' + encodeURIComponent(proxyToken) : '';
        const streamUrl = `${proxyBase}/9224/stream?port=${activePort}${tokenParam}`;
        eventSource = new EventSource(streamUrl);
        eventSource.onopen = () => {
          connected = true;
          statusEl.textContent = activeSession;
          statusEl.className = 'connected';
          renderTabs();
        };
        eventSource.onmessage = (event) => {
          handleMessage(event.data);
        };
        eventSource.addEventListener('close', () => {
          connected = false;
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          eventSource.close();
          eventSource = null;
          setTimeout(connect, 2000);
        });
        eventSource.onerror = () => {
          connected = false;
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          eventSource.close();
          eventSource = null;
          setTimeout(connect, 3000);
        };
      } else {
        const wsHost = window.location.hostname || 'localhost';
        const wsUrl = `ws://${wsHost}:${activePort}`;

        try { ws = new WebSocket(wsUrl); } catch(e) {
          statusEl.textContent = 'failed'; statusEl.className = 'disconnected';
          setTimeout(connect, 3000); return;
        }

        ws.onopen = () => {
          connected = true;
          statusEl.textContent = activeSession;
          statusEl.className = 'connected';
          renderTabs();
        };
        ws.onmessage = (event) => handleMessage(event.data);
        ws.onclose = () => {
          connected = false;
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          setTimeout(connect, 2000);
        };
        ws.onerror = () => {};
      }
    }

    // ── Input forwarding ──────────────────────────────────────────
    function sendInput(payload) {
      const json = JSON.stringify(payload);
      if (isProxied) {
        const tokenParam = proxyToken ? '&token=' + encodeURIComponent(proxyToken) : '';
        const inputUrl = `${proxyBase}/9224/input?port=${activePort}${tokenParam}`;
        fetch(inputUrl, { method: 'POST', body: json, keepalive: true }).catch(() => {});
      } else {
        if (ws && ws.readyState === 1) ws.send(json);
      }
    }

    function getScale() {
      const rect = canvas.getBoundingClientRect();
      return { sx: canvas.width / rect.width, sy: canvas.height / rect.height, rect };
    }

    function sendMouse(eventType, e, clickCount) {
      if (!connected) return;
      const { sx, sy, rect } = getScale();
      sendInput({
        type: 'input_mouse', eventType,
        x: Math.round((e.clientX - rect.left) * sx),
        y: Math.round((e.clientY - rect.top) * sy),
        button: ['left', 'middle', 'right'][e.button] || 'left',
        clickCount: clickCount || 1,
      });
    }

    canvas.addEventListener('mousedown', e => { e.preventDefault(); sendMouse('mousePressed', e); });
    canvas.addEventListener('mouseup', e => sendMouse('mouseReleased', e));
    canvas.addEventListener('mousemove', e => sendMouse('mouseMoved', e));
    canvas.addEventListener('dblclick', e => { e.preventDefault(); sendMouse('mousePressed', e, 2); });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    canvas.addEventListener('touchstart', e => {
      if (!connected) return;
      e.preventDefault();
      const { sx, sy, rect } = getScale();
      const points = Array.from(e.touches).map(t => ({
        x: Math.round((t.clientX - rect.left) * sx),
        y: Math.round((t.clientY - rect.top) * sy),
      }));
      sendInput({ type: 'input_touch', eventType: 'touchStart', touchPoints: points });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (!connected) return;
      sendInput({ type: 'input_touch', eventType: 'touchEnd', touchPoints: [] });
    });

    function sendKey(eventType, e) {
      if (!connected) return;
      sendInput({
        type: 'input_keyboard', eventType,
        key: e.key, code: e.code,
        modifiers: (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0),
      });
    }

    canvas.addEventListener('keydown', e => sendKey('keyDown', e));
    canvas.addEventListener('keyup', e => sendKey('keyUp', e));

    canvas.addEventListener('wheel', e => {
      if (!connected) return;
      e.preventDefault();
      const { sx, sy, rect } = getScale();
      sendInput({
        type: 'input_mouse', eventType: 'mouseWheel',
        x: Math.round((e.clientX - rect.left) * sx),
        y: Math.round((e.clientY - rect.top) * sy),
        deltaX: Math.round(e.deltaX), deltaY: Math.round(e.deltaY),
      });
    }, { passive: false });

    // ── Init ──────────────────────────────────────────────────────
    pollSessions();
    setInterval(pollSessions, 3000);
    connect();
  </script>
</body>
</html>
