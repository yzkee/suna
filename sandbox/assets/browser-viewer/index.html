<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Browser — Kortix</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f6f8;
      --bg-surface: #ffffff;
      --bg-elevated: #f0f1f4;
      --border: #d8dbe2;
      --border-subtle: #e7e9ee;
      --text: #111827;
      --text-secondary: #4b5563;
      --text-tertiary: #6b7280;
      --text-dim: #9ca3af;
      --accent: #ffffff;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-pill: 100px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-surface: #111111;
        --bg-elevated: #181818;
        --border: #222222;
        --border-subtle: #1a1a1a;
        --text: #e8e8e8;
        --text-secondary: #888888;
        --text-tertiary: #555555;
        --text-dim: #333333;
      }
    }

    :root[data-theme="light"] {
      --bg: #f5f6f8;
      --bg-surface: #ffffff;
      --bg-elevated: #f0f1f4;
      --border: #d8dbe2;
      --border-subtle: #e7e9ee;
      --text: #111827;
      --text-secondary: #4b5563;
      --text-tertiary: #6b7280;
      --text-dim: #9ca3af;
    }

    :root[data-theme="dark"] {
      --bg: #0a0a0a;
      --bg-surface: #111111;
      --bg-elevated: #181818;
      --border: #222222;
      --border-subtle: #1a1a1a;
      --text: #e8e8e8;
      --text-secondary: #888888;
      --text-tertiary: #555555;
      --text-dim: #333333;
    }

    body {
      background: var(--bg);
      display: flex; flex-direction: column; align-items: stretch;
      min-height: 100vh;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: var(--text); padding: 12px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .back-btn {
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      border-radius: 8px;
      font-size: 11px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: var(--bg-elevated);
      color: var(--text);
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0;
    }

    .header-right {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    /* ── Session Grid ─────────────────────────────────────────── */
    #session-tabs {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      margin-bottom: 10px;
    }

    .session-card {
      border: 1px solid var(--border);
      background: var(--bg-surface);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.12s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 248px;
    }

    .session-card:hover {
      background: var(--bg-elevated);
      border-color: #2e2e2e;
      transform: translateY(-1px);
    }

    .session-card.active {
      border-color: #4b4b4b;
      background: var(--bg-elevated);
      box-shadow: 0 0 0 1px rgba(120,120,120,0.22) inset;
    }

    .session-preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .session-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .session-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--text-tertiary);
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    .status-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-dim);
      box-shadow: 0 0 0 transparent;
    }

    .status-pill.live::before {
      background: var(--green);
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .status-pill.ready::before {
      background: #3b82f6;
      box-shadow: 0 0 6px rgba(59, 130, 246, 0.4);
    }

    .status-pill.stale::before {
      background: var(--amber);
      box-shadow: 0 0 6px rgba(245, 158, 11, 0.35);
    }

    .status-pill.dead::before {
      background: var(--text-dim);
    }

    /* ── Status Badge ─────────────────────────────────────────── */
    #status {
      font-size: 11px; padding: 4px 10px; border-radius: var(--radius-pill);
      background: var(--bg-surface); border: 1px solid var(--border);
      white-space: nowrap; font-weight: 500; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    #status::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      flex-shrink: 0;
    }
    #status.connected { color: var(--green); }
    #status.connected::before { background: var(--green); box-shadow: 0 0 6px rgba(34, 197, 94, 0.4); }
    #status.disconnected { color: var(--red); }
    #status.disconnected::before { background: var(--red); }
    #status.connecting { color: var(--amber); }
    #status.connecting::before { background: var(--amber); animation: pulse-dot 1.5s ease-in-out infinite; }
    #status.idle { color: var(--text-secondary); }
    #status.idle::before { background: var(--text-dim); box-shadow: none; animation: none; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #frame-info {
      font-size: 10px; color: var(--text-dim); white-space: nowrap;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-weight: 400; letter-spacing: 0.02em;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Viewport ─────────────────────────────────────────────── */
    #viewport-wrap {
      position: relative; background: var(--bg-surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      max-width: 95vw; max-height: calc(100vh - 70px);
    }

    body.focused {
      padding: 4px;
    }

    body.focused .back-btn {
      display: inline-flex;
    }

    body.focused #session-tabs {
      display: none;
    }

    body.focused #viewport-wrap {
      width: calc(100vw - 8px);
      max-width: calc(100vw - 8px);
      max-height: calc(100vh - 48px);
      border-radius: 8px;
    }

    body.focused #viewport-wrap {
      background: #000;
    }

    canvas {
      display: block; width: 100%; height: 100%;
      cursor: default;
      outline: none;
    }

    /* ── Empty State ──────────────────────────────────────────── */
    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 72px 28px;
      text-align: center;
      background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-elevated) 100%);
    }

    #empty-state h2 {
      font-size: 15px; font-weight: 600; color: var(--text);
      letter-spacing: -0.02em;
    }

    #empty-state .hint {
      font-size: 13px; max-width: 420px; line-height: 1.6;
      color: var(--text-tertiary);
    }

    #empty-state .cmd-block {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-radius: 8px;
      background: var(--bg); border: 1px solid var(--border);
    }

    #empty-state .cmd-block code {
      font-size: 12px; color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <header>
    <button id="back-btn" class="back-btn" type="button">Back</button>
    <div class="title">Agent Browser Live Sessions</div>
    <div class="header-right">
      <div id="status" class="connecting">connecting…</div>
      <div id="frame-info"></div>
    </div>
  </header>

  <div id="session-tabs"></div>

  <div id="viewport-wrap">
    <div id="empty-state">
      <h2>No browser session active</h2>

      <div class="hint">
        Start a browser session and click a session card to focus it.
      </div>

      <div class="cmd-block">
        <code>AGENT_BROWSER_STREAM_PORT=9223 agent-browser --session my-task --headed open https://example.com</code>
      </div>
    </div>
    <canvas id="viewport" width="1280" height="720" style="display:none" tabindex="0"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('viewport');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const frameInfo = document.getElementById('frame-info');
    const emptyState = document.getElementById('empty-state');
    const tabsEl = document.getElementById('session-tabs');
    const backBtn = document.getElementById('back-btn');
    const viewportWrap = document.getElementById('viewport-wrap');

    const PRIMARY_SESSION = 'kortix';
    let ws = null;
    let frameCount = 0;
    let lastFrameTime = 0;
    let activePort = 9223;
    let activeSession = PRIMARY_SESSION;
    let sessions = [];
    let previousSessionNames = new Set();
    let isFocusMode = false;
    let lastFrameMeta = null;
    const sessionPreviewData = {};
    const previewStreams = new Map();
    const previewRetryTimers = new Map();

    // ── Proxy detection ──────────────────────────────────────────
    // Detect if we're accessed through a proxy:
    //   1. Path-based: /v1/p/{sandboxId}/9224/...
    //   2. Subdomain: p9224-{sandboxId}.localhost:8008
    //   3. Direct: localhost:9224 (no proxy)
    // When proxied, we can't directly WS to port 9223 inside the container.
    // Instead, use same-origin SSE bridge endpoints (/stream, /input)
    // which the Bun server on port 9224 handles internally.
    const PREVIEW_PATH_RE = /^(.*\/(?:preview|v1\/p)\/[^/]+)\/\d+/;
    const SUBDOMAIN_RE = /^p(\d+)-([^.]+)\./;
    const proxyMatch = window.location.pathname.match(PREVIEW_PATH_RE);
    const subdomainMatch = window.location.hostname.match(SUBDOMAIN_RE);
    const isProxied = !!proxyMatch || !!subdomainMatch;
    // For path-based proxy, prefix API calls with the proxy base path.
    // For subdomain proxy, API calls go to same origin (no prefix needed).
    const proxyBase = proxyMatch ? proxyMatch[1] : null;
    const proxyToken = isProxied ? new URLSearchParams(window.location.search).get('token') : null;

    // Track which sessions have received frames recently (for stale detection)
    let sessionLastFrame = {};
    const STALE_THRESHOLD_MS = 10000;

    // ── URL parameter: ?session=name ─────────────────────────────
    function getUrlSession() {
      const params = new URLSearchParams(window.location.search);
      return params.get('session');
    }

    function setUrlSession(name) {
      const url = new URL(window.location);
      url.searchParams.set('session', name);
      window.history.replaceState({}, '', url);
    }

    const urlSession = getUrlSession();
    if (urlSession) {
      activeSession = urlSession;
      isFocusMode = true;
    }

    function setFocusMode(focused) {
      isFocusMode = focused;
      document.body.classList.toggle('focused', focused);
      updateViewportVisibility();
    }

    function updateViewportVisibility() {
      const hasSessions = sessions.length > 0;
      if (isFocusMode || !hasSessions) {
        viewportWrap.style.display = '';
      } else {
        viewportWrap.style.display = 'none';
      }
    }

    backBtn.addEventListener('click', () => {
      setFocusMode(false);
    });

    // ── API URL helper ──────────────────────────────────────────
    // Returns the correct URL for viewer API endpoints (/sessions, /stream, /input)
    // depending on whether we're direct, subdomain-proxied, or path-proxied.
    function apiUrl(endpoint, params) {
      const qs = new URLSearchParams(params || {});
      if (proxyToken) qs.set('token', proxyToken);
      const search = qs.toString() ? '?' + qs.toString() : '';
      if (proxyBase) {
        // Path-based proxy: /v1/p/{sandboxId}/9224/endpoint
        return `${proxyBase}/9224${endpoint}${search}`;
      }
      // Direct or subdomain proxy: same-origin endpoint
      return `${endpoint}${search}`;
    }

    // ── Session discovery ─────────────────────────────────────────
    async function pollSessions() {
      try {
        const sessionsUrl = apiUrl('/sessions');
        const res = await fetch(sessionsUrl);
        let newSessions = await res.json();

        // Avoid showing duplicate "default" when primary exists.
        // In Kortix, primary session is typically "kortix" and "default"
        // may be a secondary daemon session not intended for UI focus.
        const hasPrimary = newSessions.some((s) => s.name === PRIMARY_SESSION);
        if (hasPrimary) {
          newSessions = newSessions.filter((s) => s.name !== 'default');
        }

        const newNames = new Set(newSessions.map(s => s.name));

        if (!urlSession) {
          for (const s of newSessions) {
            if (!previousSessionNames.has(s.name) && previousSessionNames.size > 0) {
              activeSession = s.name;
              activePort = s.port;
              setUrlSession(s.name);
              reconnect();
            }
          }
        }

        if (urlSession && newNames.has(urlSession) && !previousSessionNames.has(urlSession)) {
          const target = newSessions.find(s => s.name === urlSession);
          if (target) {
            activeSession = target.name;
            activePort = target.port;
            reconnect();
          }
        }

        previousSessionNames = newNames;
        sessions = newSessions;

        if (sessions.length === 0) {
          if (ws) { ws.onclose = null; ws.close(); ws = null; }
          if (eventSource) { eventSource.close(); eventSource = null; }
          clearPreviewStreams();
          connected = false;
          statusEl.textContent = 'idle';
          statusEl.className = 'idle';
          frameInfo.textContent = '';
          renderTabs();
          return;
        }

        if (!sessions.find(s => s.name === activeSession)) {
          activeSession = sessions[0].name;
          activePort = sessions[0].port;
          setUrlSession(activeSession);
          reconnect();
        }

        const active = sessions.find(s => s.name === activeSession);
        if (active && active.port !== activePort) {
          activePort = active.port;
          reconnect();
        }

        ensurePreviewStreams();
      } catch(e) {
        sessions = [];
        clearPreviewStreams();
        connected = false;
        statusEl.textContent = 'idle';
        statusEl.className = 'idle';
      }
      renderTabs();
    }

    function renderTabs() {
      const list = sessions.length > 0 ? sessions : [];
      const now = Date.now();

      const sorted = [...list].sort((a, b) => {
        if (a.name === PRIMARY_SESSION) return -1;
        if (b.name === PRIMARY_SESSION) return 1;
        return a.name.localeCompare(b.name);
      });

      if (sorted.length === 0) {
        tabsEl.innerHTML = '';
        updateViewportVisibility();
        return;
      }

      tabsEl.innerHTML = sorted.map(s => {
        const isActive = s.name === activeSession;
        const isPrimary = s.name === PRIMARY_SESSION;
        const lastFrame = sessionLastFrame[s.name] || 0;
        const isStale = lastFrame > 0 && (now - lastFrame) > STALE_THRESHOLD_MS;
        const preview = sessionPreviewData[s.name] || '';

        let stateClass = 'ready';
        let stateLabel = 'ready';
        if (isActive && connected) {
          stateClass = 'live';
          stateLabel = 'live';
        } else if (isStale) {
          stateClass = 'stale';
          stateLabel = 'stale';
        }

        const cardClass = 'session-card' + (isActive ? ' active' : '');
        const displayName = isPrimary ? `${s.name} (primary)` : s.name;

        return `<button class="${cardClass}" data-port="${s.port}" data-name="${s.name}">` +
          `<div class="session-top">` +
            `<span class="session-name">${displayName}</span>` +
            `<span class="status-pill ${stateClass}">${stateLabel}</span>` +
          `</div>` +
          `<div class="session-preview">` +
            (preview ? `<img src="${preview}" alt="${displayName} preview" />` : '<span>waiting for preview</span>') +
          `</div>` +
          `<div class="session-meta">` +
            `<span>${isActive ? 'active session' : 'click to open'}</span>` +
            `<span>${s.name}</span>` +
          `</div>` +
          `</button>`;
      }).join('');

      tabsEl.querySelectorAll('.session-card').forEach(card => {
        card.addEventListener('click', () => {
          const port = parseInt(card.dataset.port, 10);
          const name = card.dataset.name;

          setFocusMode(true);
          setUrlSession(name);

          if (port !== activePort || name !== activeSession) {
            activePort = port;
            activeSession = name;
            frameCount = 0;
            lastFrameTime = 0;
            canvas.style.display = 'none';
            emptyState.style.display = '';
            emptyState.querySelector('h2').textContent = 'Connecting…';
            emptyState.querySelector('.hint').textContent = `Switching to session ${name}`;
            reconnect();
            renderTabs();
          }
        });
      });

      updateViewportVisibility();
    }

    function clearPreviewStreams() {
      for (const [, es] of previewStreams) {
        try { es.close(); } catch {}
      }
      previewStreams.clear();
      for (const [, t] of previewRetryTimers) {
        clearTimeout(t);
      }
      previewRetryTimers.clear();
    }

    function ensurePreviewStreams() {
      const keys = new Set(sessions.map(s => `${s.name}:${s.port}`));

      for (const [key, es] of previewStreams) {
        if (!keys.has(key)) {
          try { es.close(); } catch {}
          previewStreams.delete(key);
        }
      }

      for (const s of sessions) {
        const key = `${s.name}:${s.port}`;
        if (previewStreams.has(key)) continue;

        const connectPreview = () => {
          const streamUrl = apiUrl('/stream', { port: s.port });
          const es = new EventSource(streamUrl);
          previewStreams.set(key, es);

          es.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              if (msg.type === 'frame' && msg.data) {
                sessionPreviewData[s.name] = 'data:image/jpeg;base64,' + msg.data;
                if (!isFocusMode) renderTabs();
              }
            } catch {}
          };

          es.onerror = () => {
            try { es.close(); } catch {}
            previewStreams.delete(key);
            if (previewRetryTimers.has(key)) clearTimeout(previewRetryTimers.get(key));
            const t = setTimeout(() => {
              previewRetryTimers.delete(key);
              if (sessions.some(x => x.name === s.name && x.port === s.port)) connectPreview();
            }, 1200);
            previewRetryTimers.set(key, t);
          };
        };

        connectPreview();
      }
    }

    // ── Connection (WS direct or SSE proxied) ─────────────────────
    let connected = false;
    let eventSource = null;

    function reconnect() {
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      if (eventSource) { eventSource.close(); eventSource = null; }
      connected = false;
      connect();
    }

    function handleMessage(raw) {
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'frame' && msg.data) {
          lastFrameMeta = msg.metadata || null;
          frameCount++;
          const now = performance.now();
          const fps = lastFrameTime ? Math.round(1000 / (now - lastFrameTime)) : 0;
          lastFrameTime = now;
          sessionLastFrame[activeSession] = Date.now();

          const img = new Image();
          img.onload = () => {
            if (canvas.width !== img.width || canvas.height !== img.height) {
              canvas.width = img.width;
              canvas.height = img.height;
            }
            ctx.drawImage(img, 0, 0);
            if (canvas.style.display === 'none') {
              canvas.style.display = 'block';
              emptyState.style.display = 'none';
            }
            frameInfo.textContent = `${img.width}×${img.height}  ${fps}fps  #${frameCount}`;
          };
          img.src = 'data:image/jpeg;base64,' + msg.data;
        }
      } catch (e) {}
    }

    function connect() {
      if (!sessions.length) {
        statusEl.textContent = 'idle';
        statusEl.className = 'idle';
        return;
      }

      statusEl.textContent = 'connecting…';
      statusEl.className = 'connecting';

      if (isProxied) {
        // When behind a proxy (subdomain or path-based), use the SSE bridge.
        // The Bun server on port 9224 connects to the WS stream internally.
        const streamUrl = apiUrl('/stream', { port: activePort });
        eventSource = new EventSource(streamUrl);
        eventSource.onopen = () => {
          connected = true;
          statusEl.textContent = activeSession;
          statusEl.className = 'connected';
          if (isFocusMode) canvas.focus();
          renderTabs();
        };
        eventSource.onmessage = (event) => {
          handleMessage(event.data);
        };
        eventSource.addEventListener('close', () => {
          connected = false;
          if (!sessions.length) {
            statusEl.textContent = 'idle';
            statusEl.className = 'idle';
            return;
          }
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          eventSource.close();
          eventSource = null;
          setTimeout(connect, 2000);
        });
        eventSource.onerror = () => {
          connected = false;
          if (!sessions.length) {
            statusEl.textContent = 'idle';
            statusEl.className = 'idle';
            return;
          }
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          eventSource.close();
          eventSource = null;
          setTimeout(connect, 3000);
        };
      } else {
        // Direct access (localhost:9224) — connect WS to stream port directly
        const wsHost = window.location.hostname || 'localhost';
        const wsUrl = `ws://${wsHost}:${activePort}`;

        try { ws = new WebSocket(wsUrl); } catch(e) {
          statusEl.textContent = 'failed'; statusEl.className = 'disconnected';
          setTimeout(connect, 3000); return;
        }

        ws.onopen = () => {
          connected = true;
          statusEl.textContent = activeSession;
          statusEl.className = 'connected';
          if (isFocusMode) canvas.focus();
          renderTabs();
        };
        ws.onmessage = (event) => handleMessage(event.data);
        ws.onclose = () => {
          connected = false;
          if (!sessions.length) {
            statusEl.textContent = 'idle';
            statusEl.className = 'idle';
            return;
          }
          statusEl.textContent = 'disconnected';
          statusEl.className = 'disconnected';
          renderTabs();
          setTimeout(connect, 2000);
        };
        ws.onerror = () => {};
      }
    }

    // ── Input forwarding ──────────────────────────────────────────
    function sendInput(payload) {
      const json = JSON.stringify(payload);
      if (isProxied) {
        // Use HTTP POST to the SSE bridge's input endpoint
        const inputUrl = apiUrl('/input', { port: activePort });
        fetch(inputUrl, { method: 'POST', body: json, keepalive: true }).catch(() => {});
      } else {
        if (ws && ws.readyState === 1) ws.send(json);
      }
    }

    function mapPointerToPage(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const localX = Math.max(0, Math.min(rect.width, clientX - rect.left));
      const localY = Math.max(0, Math.min(rect.height, clientY - rect.top));

      if (!lastFrameMeta) {
        return {
          x: Math.round(localX * (canvas.width / rect.width)),
          y: Math.round(localY * (canvas.height / rect.height)),
        };
      }

      const deviceWidth = lastFrameMeta.deviceWidth || canvas.width;
      const deviceHeight = lastFrameMeta.deviceHeight || canvas.height;

      return {
        x: Math.round(localX * (deviceWidth / rect.width)),
        y: Math.round(localY * (deviceHeight / rect.height)),
      };
    }

    function sendMouse(eventType, e, clickCount) {
      if (!connected) return;
      const mapped = mapPointerToPage(e.clientX, e.clientY);
      sendInput({
        type: 'input_mouse', eventType,
        x: mapped.x,
        y: mapped.y,
        button: ['left', 'middle', 'right'][e.button] || 'left',
        clickCount: clickCount || 1,
      });
    }

    canvas.addEventListener('mousedown', e => {
      e.preventDefault();
      canvas.focus();
      sendMouse('mousePressed', e);
    });
    canvas.addEventListener('mouseup', e => sendMouse('mouseReleased', e));
    canvas.addEventListener('mousemove', e => sendMouse('mouseMoved', e));
    canvas.addEventListener('dblclick', e => { e.preventDefault(); sendMouse('mousePressed', e, 2); });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    canvas.addEventListener('touchstart', e => {
      if (!connected) return;
      e.preventDefault();
      canvas.focus();
      const points = Array.from(e.touches).map(t => ({
        ...mapPointerToPage(t.clientX, t.clientY),
      }));
      sendInput({ type: 'input_touch', eventType: 'touchStart', touchPoints: points });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (!connected) return;
      sendInput({ type: 'input_touch', eventType: 'touchEnd', touchPoints: [] });
    });

    function sendKey(eventType, e) {
      if (!connected) return;
      const modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
      const isPrintable = e.key && e.key.length === 1;
      sendInput({
        type: 'input_keyboard', eventType,
        key: e.key, code: e.code,
        text: eventType === 'keyDown' && isPrintable && !e.ctrlKey && !e.metaKey && !e.altKey ? e.key : undefined,
        modifiers,
      });
    }

    canvas.addEventListener('keydown', e => {
      e.preventDefault();
      sendKey('keyDown', e);
    });
    canvas.addEventListener('keyup', e => {
      e.preventDefault();
      sendKey('keyUp', e);
    });

    canvas.addEventListener('wheel', e => {
      if (!connected) return;
      e.preventDefault();
      const mapped = mapPointerToPage(e.clientX, e.clientY);
      sendInput({
        type: 'input_mouse', eventType: 'mouseWheel',
        x: mapped.x,
        y: mapped.y,
        deltaX: Math.round(e.deltaX), deltaY: Math.round(e.deltaY),
      });
    }, { passive: false });

    // ── Init ──────────────────────────────────────────────────────
    pollSessions();
    setInterval(pollSessions, 3000);
    setFocusMode(isFocusMode);
    connect();

    function applyThemePreference() {
      try {
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'dark' || storedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', storedTheme);
          return;
        }
        // system/default mode
        document.documentElement.removeAttribute('data-theme');
      } catch {
        // Ignore storage access issues and fall back to media query theme.
      }
    }

    applyThemePreference();

    try {
      window.addEventListener('storage', (e) => {
        if (e.key === 'theme') applyThemePreference();
      });
    } catch {}
  </script>
</body>
</html>
