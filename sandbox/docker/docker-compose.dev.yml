# Dev mode overlay — bind-mounts local source into the running container.
#
# Usage (via pnpm dev:sandbox):
#   docker compose -f sandbox/docker/docker-compose.yml \
#                  -f sandbox/docker/docker-compose.dev.yml up
#
# The base docker-compose.yml uses the image with ALL deps prebaked at build
# time. This overlay then mounts your local source OVER the prebaked code so
# changes are reflected immediately without rebuilding.
#
# You only need --build when:
#   - Dockerfile changes
#   - A new npm/bun dependency is added
#   - package.json changes
#
# For pure code changes (TypeScript, agents, skills, tools):
#   Edit the file → it's already live in the container
#   Restart the service if needed:
#     docker exec kortix-sandbox s6-svc -r /run/service/svc-kortix-master
#
# Note: volume host paths are relative to this compose file's directory (sandbox/docker/)

services:
  desktop:
    environment:
      - KORTIX_DEV_MODE=1
    volumes:
      # Bind-mount local source over the prebaked /opt dirs
      - ../kortix-master/src:/opt/kortix-master/src:ro
      # kortix-opencode IS the opencode config dir — mount individual subdirs
      # to preserve node_modules from the prebaked image
      - ../../packages/kortix-opencode/plugin:/opt/opencode/plugin:ro
      - ../../packages/kortix-opencode/agents:/opt/opencode/agents:ro
      - ../../packages/kortix-opencode/commands:/opt/opencode/commands:ro
      - ../../packages/kortix-opencode/skills:/opt/opencode/skills:ro
      - ../../packages/kortix-opencode/tools:/opt/opencode/tools:ro
      - ../../packages/kortix-opencode/patches:/opt/opencode/patches:ro
      - ../../packages/kortix-opencode/opencode.jsonc:/opt/opencode/opencode.jsonc:ro
      - ../../packages/opencode-channels/src:/opt/opencode-channels/src:ro
      - ../../packages/opencode-agent-triggers/src:/opt/opencode-agent-triggers/src:ro
      # Service scripts (baked-in JS for presentation-viewer, static-web, agent-browser-viewer)
      - ../services:/opt/services:ro
