# Kortix API Proxy DNS overrides
# Maps external API hostnames → router-api.kortix.com
# Only active when ENV_MODE=cloud (entrypoint.sh controls activation)

cname=api.tavily.com,router-api.kortix.com
cname=google.serper.dev,router-api.kortix.com
cname=api.firecrawl.dev,router-api.kortix.com
cname=api.replicate.com,router-api.kortix.com
cname=context7.com,router-api.kortix.com

# Listen only on localhost
listen-address=127.0.0.1
bind-interfaces

# Don't read /etc/resolv.conf (use upstream DNS directly)
no-resolv

# Upstream DNS servers
server=8.8.8.8
server=8.8.4.4

# Supervisord manages the process lifecycle
keep-in-foreground
