# Dev override: mount local dev entry points into the sandbox
# to run the opencode server from custom entry points using Bun
# instead of the globally-installed npm binary.
#
# Note: The fork (services/opencode) has been removed. OpenCode is now
# installed from upstream `opencode-ai` via npm. This file only mounts
# the minimal dev entry points and s6 overrides.
#
# Usage (standalone sandbox):
#   cd sandbox
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  desktop:
    volumes:
      - ./dev/serve-entry.ts:/opt/opencode-dev/serve-entry.ts:ro
      - ./dev/web-entry.ts:/opt/opencode-dev/web-entry.ts:ro
      - ./dev/svc-opencode-serve-run:/etc/s6-overlay/s6-rc.d/svc-opencode-serve/run:ro
      - ./dev/svc-opencode-web-run:/etc/s6-overlay/s6-rc.d/svc-opencode-web/run:ro
      - ./dev/opencode-dev-init.sh:/custom-cont-init.d/99-opencode-dev-init.sh:ro
