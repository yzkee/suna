# ─────────────────────────────────────────────────────────────────────────────
# Kortix Sandbox — Docker Compose (single instance, fixed ports)
# ─────────────────────────────────────────────────────────────────────────────
#
# PERSISTENCE MODEL
# =================
#
# The sandbox has exactly THREE logical zones:
#
#   /workspace/   →  PERSISTENT USER WORKSPACE (Docker named volume "sandbox_data")
#                    Code, repos, user-installed packages, project files.
#
#   /persistent/  →  PERSISTENT SYSTEM STATE (symlink → /workspace/.persistent-system)
#                    OpenCode DB + shadow backup, secrets, auth.json, browser
#                    profile, lss data, and other sandbox-internal state.
#                    Kept away from normal workspace paths so user/project ops
#                    do not casually touch critical runtime data.
#
#   /ephemeral/  →  SHIPPED RUNTIME (image layer, REPLACED on every update)
#                    Kortix server, OpenCode config, services, metadata.
#                    Rebuilt from scratch on every `docker pull` + recreate.
#                    NEVER store user data here. NEVER modify at runtime.
#
#   /opt/        →  SYSTEM (image layer, user/system packages)
#                    Third-party tools (bun, etc). Container-layer only.
#
# On container recreate (image update):
#   ✅ /workspace/*          — preserved (volume)
#   ✅ secrets, encryption   — preserved (/persistent/secrets/)
#   ✅ OpenCode state/DB     — preserved (/persistent/opencode/)
#   ✅ OpenCode shadow copy  — preserved (/persistent/opencode-shadow/)
#   ✅ user-installed pkgs   — preserved (/workspace/.local/, .npm-global/, .kortix/packages/)
#   ✅ git repos, projects   — preserved (/workspace/)
#   ❌ /opt/*                — replaced (new image)
#   ❌ /run/s6/              — rebuilt from /persistent/secrets/ on boot
#   ❌ apk system packages   — re-installed from manifest on boot (99-restore-packages.sh)
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  desktop:
    pull_policy: never
    build:
      context: ../..
      dockerfile: core/docker/Dockerfile
      args:
        SANDBOX_VERSION: ${SANDBOX_VERSION:-dev}
    image: kortix/computer:${SANDBOX_VERSION:-dev}
    container_name: kortix-sandbox
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PUID=911
      - PGID=911
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox ${SANDBOX_NAME:-default}
      - OPENCODE_CONFIG_DIR=/ephemeral/kortix-master/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - KORTIX_PERSISTENT_ROOT=/persistent
      - OPENCODE_STORAGE_BASE=/persistent/opencode
      - OPENCODE_SHADOW_STORAGE_BASE=/persistent/opencode-shadow
      - KORTIX_OPENCODE_ARCHIVE_DIR=/persistent/opencode-archive
      - KORTIX_OPENCODE_CACHE_DIR=/persistent/opencode-cache
      - AUTH_JSON_PATH=/persistent/opencode/auth.json
      - LSS_DIR=/persistent/lss
      - KORTIX_WORKSPACE=/workspace
      # ── Persistent package paths (all under /workspace/) ──────────────
      - PYTHONUSERBASE=/workspace/.local
      - PIP_USER=1
      - NPM_CONFIG_PREFIX=/workspace/.npm-global
      # ── Persistent secret paths (all under /persistent/secrets/) ─────
      - SECRET_FILE_PATH=/persistent/secrets/.secrets.json
      - SALT_FILE_PATH=/persistent/secrets/.salt
      - ENCRYPTION_KEY_PATH=/persistent/secrets/.encryption-key
      # ── Sandbox identity (injected by kortix-api or set manually) ─────
      - KORTIX_API_URL=${KORTIX_API_URL:-http://host.docker.internal:8008}
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      - TUNNEL_API_URL=${KORTIX_API_URL:-http://host.docker.internal:8008}
      - TUNNEL_TOKEN=${KORTIX_TOKEN:-}
      - SANDBOX_ID=${SANDBOX_ID:-local}
      - PROJECT_ID=${PROJECT_ID:-local}
      - ENV_MODE=${ENV_MODE:-local}
      - KORTIX_LOCAL_SOURCE=${KORTIX_LOCAL_SOURCE:-1}
      - START_DOCKER=true
    env_file:
      - .env
    volumes:
      # ── THE persistence volume ─────────────────────────────────────────
      # Single volume, mounted at /workspace. This is the ONLY persistent
      # storage for user code and state. /config is a symlink to /workspace
      # (linuxserver compat). Everything that needs to survive container
      # recreate MUST live here.
      - sandbox_data:/workspace
      - sandbox_data:/config
      # ── Docker-in-Docker data root ─────────────────────────────────────
      # Dedicated named volume for dockerd's /var/lib/docker. This is NOT
      # "user data" — it's image layers, container fs, volumes, networks.
      # Separate from sandbox_data because:
      #   1. dockerd needs a NATIVE filesystem here (for overlay2). If we
      #      stuck it inside /workspace the nested overlay-on-overlay
      #      config would force us to vfs (huge + slow) or fuse-overlayfs.
      #   2. User-workspace backups should not drag along every image layer.
      #   3. "docker system prune" should be decoupled from user data.
      # Pulled images + containers survive container recreate but can be
      # nuked independently via `docker volume rm sandbox_docker`.
      - sandbox_docker:/var/lib/docker
    ports:
      - "127.0.0.1:14000:8000"  # Kortix Master (proxy entry point)
      - "127.0.0.1:14002:6080"  # Desktop (noVNC)
      - "127.0.0.1:14003:6081"  # Desktop (HTTPS)
      - "127.0.0.1:14004:3210"  # Presentation Viewer
      - "127.0.0.1:14005:9223"  # Agent Browser Stream (WS)
      - "127.0.0.1:14006:9224"  # Agent Browser Viewer
      - "127.0.0.1:14007:22"    # SSH
      - "127.0.0.1:14008:3211"  # Static Web Server (standalone HTML/assets)
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sandbox_data:
  sandbox_docker:
