# Channel Triggers — Example configurations for Telegram, Slack, Discord
#
# These webhook triggers replace the old channels service entirely.
# Copy the ones you need into your project's .kortix/triggers.yaml.
#
# How it works:
#   1. Platform sends webhook → /hooks/<platform>
#   2. Trigger system parses payload, extracts context values
#   3. Agent session created (or reused per chat via session_key)
#   4. Agent receives the message as a prompt with full context
#   5. Agent replies using: channel_send platform=<platform> to=<chat_id> text="..."
#
# Prerequisites:
#   - Set TELEGRAM_BOT_TOKEN / SLACK_BOT_TOKEN / DISCORD_BOT_TOKEN via /env API
#   - Register webhook URL with the platform (see notes per trigger below)

triggers:

  # ── Telegram ──────────────────────────────────────────────────────────────
  # Register webhook: curl -X POST "https://api.telegram.org/bot<TOKEN>/setWebhook?url=<PUBLIC_URL>/hooks/telegram"
  - name: telegram-inbound
    description: "Incoming Telegram messages → agent session"
    source:
      type: webhook
      path: /hooks/telegram
    action:
      type: prompt
      session_mode: reuse
      prompt: |
        You received a Telegram message.

        From: {{ from_name }} (@{{ from_username }})
        Chat ID: {{ chat_id }}
        Message: {{ text }}

        Respond using: channel_send platform=telegram to={{ chat_id }} text="your reply"
        You can also choose not to respond if the message doesn't need a reply.
    context:
      extract:
        chat_id: "data.body.message.chat.id"
        text: "data.body.message.text"
        from_name: "data.body.message.from.first_name"
        from_username: "data.body.message.from.username"
        message_id: "data.body.message.message_id"
      # Each Telegram chat gets its own persistent agent session
      session_key: "telegram:{{ chat_id }}"
      include_raw: false

  # ── Slack ──────────────────────────────────────────────────────────────────
  # Configure in Slack App Dashboard:
  #   Event Subscriptions → Request URL: <PUBLIC_URL>/hooks/slack
  #   Subscribe to: message.channels, app_mention
  - name: slack-inbound
    description: "Incoming Slack messages → agent session"
    source:
      type: webhook
      path: /hooks/slack
    action:
      type: prompt
      session_mode: reuse
      prompt: |
        You received a Slack message.

        Channel: {{ channel }}
        User: {{ user }}
        Message: {{ text }}
        Thread: {{ thread_ts }}

        Respond using: channel_send platform=slack to={{ channel }} text="your reply" thread_ts={{ thread_ts }}
        You can also choose not to respond if the message doesn't need a reply.
    context:
      extract:
        channel: "data.body.event.channel"
        user: "data.body.event.user"
        text: "data.body.event.text"
        thread_ts: "data.body.event.thread_ts"
        event_ts: "data.body.event.ts"
      # Each Slack channel gets its own persistent agent session
      session_key: "slack:{{ channel }}"
      include_raw: false

  # ── Discord ───────────────────────────────────────────────────────────────
  # Configure in Discord Developer Portal:
  #   Interactions Endpoint URL: <PUBLIC_URL>/hooks/discord
  - name: discord-inbound
    description: "Incoming Discord messages → agent session"
    source:
      type: webhook
      path: /hooks/discord
    action:
      type: prompt
      session_mode: reuse
      prompt: |
        You received a Discord message.

        Channel: {{ channel_id }}
        Author: {{ author_username }}
        Message: {{ content }}

        Respond using: channel_send platform=discord to={{ channel_id }} text="your reply"
        You can also choose not to respond if the message doesn't need a reply.
    context:
      extract:
        channel_id: "data.body.d.channel_id"
        content: "data.body.d.content"
        author_username: "data.body.d.author.username"
        message_id: "data.body.d.id"
      session_key: "discord:{{ channel_id }}"
      include_raw: false
