<!DOCTYPE html>
<html>
<head>
<title>OpenCode Voice</title>
<style>
  body { font-family: system-ui; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .container { text-align: center; max-width: 500px; }
  h1 { font-size: 1.5rem; color: #888; margin-bottom: 0.5rem; }
  p { color: #555; margin-bottom: 2rem; font-size: 0.85rem; }
  #status { margin-top: 1.5rem; color: #666; min-height: 1.5em; }
  #controls { margin-top: 1rem; display: none; }
  #mute-btn {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  #mute-btn:hover { border-color: #555; color: #bbb; }
  #mute-btn.muted { border-color: #ef4444; color: #ef4444; }
  #log { margin-top: 2rem; text-align: left; font-size: 0.75rem; color: #555; max-height: 300px; overflow-y: auto; padding: 0.75rem; background: #111; border-radius: 8px; border: 1px solid #222; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<div class="container">
  <h1>OpenCode Voice</h1>
  <p>Click the button that appears in the bottom-right corner to start a call.</p>
  <div id="status">Loading VAPI...</div>
  <div id="controls">
    <button id="mute-btn" onclick="toggleMute()">Mute Mic</button>
  </div>
  <div id="log"></div>
</div>

<script>
const PUBLIC_KEY = "a08a584d-5a67-4f20-b4df-f3b8a5f2276f";
const ASSISTANT_ID = "c1213132-7b17-461b-a4e5-6e3da1039165";

const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const controlsEl = document.getElementById("controls");
const muteBtn = document.getElementById("mute-btn");

let isMuted = false;

function log(msg) {
  const line = new Date().toLocaleTimeString() + " " + msg + "\n";
  logEl.textContent = line + logEl.textContent;
  console.log("[VAPI]", msg);
}

function toggleMute() {
  if (!vapiInstance) return;
  isMuted = !isMuted;
  vapiInstance.setMuted(isMuted);
  muteBtn.textContent = isMuted ? "Unmute Mic" : "Mute Mic";
  muteBtn.classList.toggle("muted", isMuted);
  log(isMuted ? "Mic muted" : "Mic unmuted");
  statusEl.textContent = isMuted ? "Muted — OpenCode can't hear you" : "Listening...";
}

var vapiInstance = null;

(function(d, t) {
  var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
  g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
  g.defer = true;
  g.async = true;
  s.parentNode.insertBefore(g, s);

  g.onload = function() {
    log("SDK loaded");
    statusEl.textContent = "Ready — click the mic button (bottom-right)";

    vapiInstance = window.vapiSDK.run({
      apiKey: PUBLIC_KEY,
      assistant: ASSISTANT_ID,
      config: {
        position: "bottom-right",
        offset: "40px",
        width: "50px",
        height: "50px",
        idle: {
          color: "rgb(74, 222, 128)",
          type: "pill",
          title: "Talk to OpenCode",
          subtitle: "Click to start",
          icon: "https://unpkg.com/lucide-static@0.321.0/icons/mic.svg",
        },
        active: {
          color: "rgb(239, 68, 68)",
          type: "pill",
          title: "Listening...",
          subtitle: "Click to end",
          icon: "https://unpkg.com/lucide-static@0.321.0/icons/phone-off.svg",
        },
        loading: {
          color: "rgb(234, 179, 8)",
          type: "pill",
          title: "Connecting...",
          subtitle: "Please wait",
          icon: "https://unpkg.com/lucide-static@0.321.0/icons/loader-2.svg",
        },
      },
    });

    if (vapiInstance) {
      vapiInstance.on("call-start", () => {
        log("Call started");
        statusEl.textContent = "Connected — speak freely!";
        controlsEl.style.display = "block";
        isMuted = false;
        muteBtn.textContent = "Mute Mic";
        muteBtn.classList.remove("muted");
      });
      vapiInstance.on("call-end", () => {
        log("Call ended");
        statusEl.textContent = "Call ended — click mic to start again";
        controlsEl.style.display = "none";
      });
      vapiInstance.on("speech-start", () => {
        if (!isMuted) statusEl.textContent = "OpenCode speaking...";
      });
      vapiInstance.on("speech-end", () => {
        if (!isMuted) statusEl.textContent = "Listening...";
      });
      vapiInstance.on("error", (e) => {
        log("Error: " + JSON.stringify(e));
        statusEl.textContent = "Error — check log";
      });
      vapiInstance.on("message", (msg) => {
        if (msg.type === "transcript" && msg.transcriptType === "final") {
          log((msg.role === "user" ? "You" : "OpenCode") + ": " + msg.transcript);
        }
      });
      log("Instance ready");
    }
  };

  g.onerror = function() {
    log("Failed to load VAPI SDK");
    statusEl.textContent = "Failed to load VAPI SDK";
  };
})(document, "script");
</script>
</body>
</html>
