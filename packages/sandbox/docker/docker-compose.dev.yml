# Dev mode overlay — bind-mounts local source into the running container.
#
# Usage (via pnpm dev:sandbox):
#   docker compose -f packages/sandbox/docker/docker-compose.yml \
#                  -f packages/sandbox/docker/docker-compose.dev.yml up
#
# The base docker-compose.yml builds the image with ALL deps prebaked at build
# time. This overlay then mounts your local source OVER the prebaked code so
# changes are reflected immediately without rebuilding.
#
# You only need --build when:
#   - Dockerfile changes
#   - A new npm/bun dependency is added to a package
#   - package.json changes in any sandbox package
#
# For pure code changes (TypeScript, agents, skills, tools):
#   Edit the file → it's already live in the container
#   Restart the service if needed:
#     docker exec kortix-sandbox s6-svc -r /run/service/svc-kortix-master
#
# Note: volume host paths are relative to this compose file's directory (packages/sandbox/docker/)

services:
  desktop:
    environment:
      - KORTIX_DEV_MODE=1
    volumes:
      # Bind-mount local source over the prebaked versions.
      # These paths map directly to the active /opt/* symlink targets.
      - ../kortix-master/src:/opt/kortix-master/src:ro
      - ../../../packages/kortix-oc/runtime:/opt/kortix-oc/runtime:ro
      - ../../../packages/opencode-channels/src:/opt/opencode-channels/src:ro
      - ../../../packages/opencode-agent-triggers/src:/opt/opencode-agent-triggers/src:ro
