# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Kortix Local — All-in-One Docker Compose                                 ║
# ║                                                                            ║
# ║  Starts all 4 services needed for local development:                       ║
# ║    1. postgres   — PostgreSQL + pg_cron + pg_net  (localhost:54322)         ║
# ║    2. frontend   — Next.js dashboard              (http://localhost:3000)   ║
# ║    3. kortix-api — Backend API (Bun/Hono)         (http://localhost:8008)   ║
# ║    4. sandbox    — AI agent environment (proxied via kortix-api)            ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    docker compose -f docker-compose.local.yml up                           ║
# ║    docker compose -f docker-compose.local.yml up -d        (background)    ║
# ║    docker compose -f docker-compose.local.yml down                         ║
# ║    docker compose -f docker-compose.local.yml logs -f      (tail logs)     ║
# ║                                                                            ║
# ║  Prerequisites:                                                            ║
# ║    1. cp .env.example .env   (fill in at least one LLM API key)            ║
# ║    2. cp sandbox/.env.example sandbox/.env  (fill in API keys)             ║
# ║    3. ./scripts/setup-env.sh  (generates per-service .env files)           ║
# ║                                                                            ║
# ║  Database:                                                                 ║
# ║    PostgreSQL runs on localhost:54322 with pg_cron and pg_net extensions.   ║
# ║    Data is persisted in the 'postgres-data' Docker volume.                 ║
# ║    To reset: docker compose -f docker-compose.local.yml down -v            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ─── PostgreSQL (Local Database) ────────────────────────────────────────────
  postgres:
    build:
      context: services/postgres
      dockerfile: Dockerfile
    ports:
      - "54322:5432"    # Host port 54322 matches .env.example convention
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_cron,pg_net
      -c cron.database_name=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── Frontend (Next.js Dashboard) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PNPM_LOCKFILE_MODE: --no-frozen-lockfile
        # NEXT_PUBLIC_* must be build args (baked into JS bundle at build time)
        NEXT_PUBLIC_ENV_MODE: local
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8008/v1
    ports:
      - "3000:3000"
    environment:
      # Runtime env vars (not strictly needed for NEXT_PUBLIC_*, but keeps
      # them visible in `docker inspect` and available to server-side code)
      - NEXT_PUBLIC_ENV_MODE=local
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8008/v1
    env_file:
      - path: apps/frontend/.env
        required: false
    depends_on:
      kortix-api:
        condition: service_started
    restart: unless-stopped

  # ─── Kortix API (Backend Monolith) ─────────────────────────────────────────
  kortix-api:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: kortix-api
    # Run as root so the API can access the Docker socket
    # (socket is owned by root:root, bun user can't read it otherwise)
    user: "0:0"
    ports:
      - "8008:8008"
    environment:
      - ENV_MODE=local
      - PORT=8008
      - SANDBOX_PROVIDER=local_docker
      # Docker socket lets the API detect/manage the sandbox container
      - DOCKER_HOST=unix:///var/run/docker.sock
      # OrbStack on macOS: set DOCKER_SOCKET to ~/.orbstack/run/docker.sock
      # The API tells sandboxes to call back via the Docker network
      - KORTIX_URL=http://kortix-api:8008/v1/router
      # Sandbox proxy: route /v1/sandbox/* to the sandbox container via Docker network
      - SANDBOX_INTERNAL_URL=http://sandbox:8000
      # Optional: sandbox auth token (set in .env to protect sandbox access)
      - SANDBOX_AUTH_TOKEN=${SANDBOX_AUTH_TOKEN:-}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      # ─── Database (connects to the postgres service) ───────────────────
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      # ─── pg_cron scheduler ─────────────────────────────────────────────
      - CRON_API_URL=http://kortix-api:8008
      - CRON_TICK_SECRET=local-dev-cron-secret
      - SCHEDULER_ENABLED=true
    env_file:
      - path: services/kortix-api/.env
        required: false
    volumes:
      # Mount Docker socket so the API can detect the sandbox container
      # Default: /var/run/docker.sock (Docker Desktop)
      # OrbStack: set DOCKER_SOCKET=~/.orbstack/run/docker.sock
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Sandbox (AI Agent Environment) ────────────────────────────────────────
  sandbox:
    image: kortix/computer:${SANDBOX_VERSION:-latest}
    container_name: kortix-sandbox
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox
      - OPENCODE_CONFIG_DIR=/opt/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - LSS_DIR=/workspace/.lss
      - KORTIX_WORKSPACE=/workspace
      # The sandbox reaches the API through the Docker network
      - KORTIX_API_URL=http://kortix-api:8008/v1/router
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - SANDBOX_ID=kortix-sandbox
      - PROJECT_ID=local
      - ENV_MODE=local
      # Optional: internal service key (set in .env to protect sandbox routes)
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      - SANDBOX_PORT_MAP={"8000":"14000","3111":"14001","6080":"14002","6081":"14003","3210":"14004","9223":"14005","9224":"14006"}
    env_file:
      - path: sandbox/.env
        required: false
    volumes:
      - sandbox-workspace:/workspace
      - sandbox-secrets:/app/secrets
    # All sandbox access goes through the backend proxy (kortix-api → sandbox:8000).
    # Only Kortix Master (14000) is exposed for direct debugging; all other services
    # are reached via /v1/sandbox/proxy/{port}/ through the backend.
    ports:
      - "14000:8000"   # Kortix Master (direct debug access only)
    expose:
      - "3111"   # OpenCode Web UI
      - "6080"   # Desktop (noVNC)
      - "6081"   # Desktop (HTTPS)
      - "3210"   # Presentation Viewer
      - "9223"   # Agent Browser Stream (WS)
      - "9224"   # Agent Browser Viewer
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  sandbox-workspace:
  sandbox-secrets:
