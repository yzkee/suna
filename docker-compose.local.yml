# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Kortix Local — Docker Compose                                             ║
# ║                                                                            ║
# ║  Starts 3 services for local development:                                  ║
# ║    1. frontend   — Next.js dashboard              (http://localhost:3000)   ║
# ║    2. kortix-api — Backend API (Bun/Hono)         (http://localhost:8008)   ║
# ║    3. sandbox    — AI agent environment (proxied via kortix-api)            ║
# ║                                                                            ║
# ║  Prerequisites:                                                            ║
# ║    1. supabase start        (starts local Supabase — DB, Auth, etc.)       ║
# ║    2. cp .env.example .env  (fill in at least one LLM API key)             ║
# ║       Run `supabase status` and copy DB URL, API URL, keys into .env       ║
# ║    3. cp sandbox/.env.example sandbox/.env  (fill in API keys)             ║
# ║    4. ./scripts/setup-env.sh  (generates per-service .env files)           ║
# ║                                                                            ║
# ║  Database:                                                                 ║
# ║    PostgreSQL is managed by Supabase CLI (`supabase start`).               ║
# ║    It runs on localhost:54322 with pg_cron + pg_net built in.              ║
# ║    Data is persisted in Supabase's Docker volumes.                         ║
# ║    To reset: supabase db reset                                             ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    docker compose -f docker-compose.local.yml up                           ║
# ║    docker compose -f docker-compose.local.yml up -d        (background)    ║
# ║    docker compose -f docker-compose.local.yml down                         ║
# ║    docker compose -f docker-compose.local.yml logs -f      (tail logs)     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ─── Frontend (Next.js Dashboard) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PNPM_LOCKFILE_MODE: --no-frozen-lockfile
        # NEXT_PUBLIC_* must be build args (baked into JS bundle at build time)
        NEXT_PUBLIC_ENV_MODE: local
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8008/v1
    ports:
      - "3000:3000"
    environment:
      # Runtime env vars (not strictly needed for NEXT_PUBLIC_*, but keeps
      # them visible in `docker inspect` and available to server-side code)
      - NEXT_PUBLIC_ENV_MODE=local
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8008/v1
    env_file:
      - path: apps/frontend/.env
        required: false
    depends_on:
      kortix-api:
        condition: service_started
    restart: unless-stopped

  # ─── Kortix API (Backend Monolith) ─────────────────────────────────────────
  kortix-api:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: kortix-api
    # Run as root so the API can access the Docker socket
    # (socket is owned by root:root, bun user can't read it otherwise)
    user: "0:0"
    ports:
      - "8008:8008"
    extra_hosts:
      # Ensures host.docker.internal resolves on Linux (already works on macOS/Windows)
      - "host.docker.internal:host-gateway"
    environment:
      - ENV_MODE=local
      - PORT=8008
      - ALLOWED_SANDBOX_PROVIDERS=local_docker
      # Docker socket lets the API detect/manage sandbox containers
      - DOCKER_HOST=unix:///var/run/docker.sock
      # OrbStack on macOS: set DOCKER_SOCKET to ~/.orbstack/run/docker.sock
      # The API tells sandboxes to call back via the Docker network
      - KORTIX_URL=http://kortix-api:8008/v1/router
      # Network to place sandbox containers on (must match this compose project's network)
      - SANDBOX_NETWORK=computer_default
      # Optional: sandbox auth token (set in .env to protect sandbox access)
      - SANDBOX_AUTH_TOKEN=${SANDBOX_AUTH_TOKEN:-}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      # ─── Database (connects to Supabase local DB via host) ─────────────
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      # ─── Supabase (local instance via host) ────────────────────────────
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      # ─── Integrations (Pipedream Connect — optional) ─────────────────
      - PIPEDREAM_CLIENT_ID=${PIPEDREAM_CLIENT_ID:-}
      - PIPEDREAM_CLIENT_SECRET=${PIPEDREAM_CLIENT_SECRET:-}
      - PIPEDREAM_PROJECT_ID=${PIPEDREAM_PROJECT_ID:-}
      - PIPEDREAM_ENVIRONMENT=${PIPEDREAM_ENVIRONMENT:-development}
      # ─── pg_cron scheduler ─────────────────────────────────────────────
      - CRON_API_URL=http://kortix-api:8008
      - CRON_TICK_SECRET=local-dev-cron-secret
      - SCHEDULER_ENABLED=true
    env_file:
      - path: services/kortix-api/.env
        required: false
    volumes:
      # Mount Docker socket so the API can detect sandbox containers
      # Default: /var/run/docker.sock (Docker Desktop)
      # OrbStack: set DOCKER_SOCKET=~/.orbstack/run/docker.sock
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    restart: unless-stopped

  # ─── Sandbox (AI Agent Environment) ────────────────────────────────────────
  sandbox:
    image: kortix/computer:${SANDBOX_VERSION:-latest}
    container_name: kortix-sandbox
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBFOLDER=/
      - TITLE=Kortix Sandbox
      - OPENCODE_CONFIG_DIR=/opt/opencode
      - OPENCODE_PERMISSION={"*":"allow"}
      - DISPLAY=:1
      - LSS_DIR=/workspace/.lss
      - KORTIX_WORKSPACE=/workspace
      # The sandbox reaches the API through the Docker network
      - KORTIX_API_URL=http://kortix-api:8008/v1/router
      - KORTIX_TOKEN=${KORTIX_TOKEN:-}
      - SANDBOX_ID=kortix-sandbox
      - PROJECT_ID=local
      - ENV_MODE=local
      # Optional: internal service key (set in .env to protect sandbox routes)
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-}
      - SANDBOX_PORT_MAP={"8000":"14000","3111":"14001","6080":"14002","6081":"14003","3210":"14004","9223":"14005","9224":"14006"}
    env_file:
      - path: sandbox/.env
        required: false
    volumes:
      - sandbox-workspace:/workspace
      - sandbox-secrets:/app/secrets
      # Mount patched OpenCode tools (cron-triggers auth fix)
      - ./sandbox/opencode/tools:/opt/opencode/tools:ro
    # All sandbox access goes through the backend proxy (kortix-api → sandbox:8000).
    # Only Kortix Master (14000) is exposed for direct debugging; all other services
    # are reached via /v1/sandbox/proxy/{port}/ through the backend.
    ports:
      - "14000:8000"   # Kortix Master (direct debug access only)
    expose:
      - "3111"   # OpenCode Web UI
      - "6080"   # Desktop (noVNC)
      - "6081"   # Desktop (HTTPS)
      - "3210"   # Presentation Viewer
      - "9223"   # Agent Browser Stream (WS)
      - "9224"   # Agent Browser Viewer
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kortix/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sandbox-workspace:
  sandbox-secrets:
