name: Sync Secrets & Restart

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER: kortix-prod

jobs:
  sync:
    name: Sync Secrets & Restart Pods
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Force sync external secrets
        run: |
          kubectl annotate externalsecret kortix-api-secrets -n kortix \
            force-sync=$(date +%s) --overwrite

      - name: Wait for secret sync
        run: |
          echo "Waiting for ExternalSecret to sync..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get externalsecret kortix-api-secrets -n kortix \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
            REASON=$(kubectl get externalsecret kortix-api-secrets -n kortix \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}')
            echo "Attempt ${i}/30 - Ready: ${STATUS}, Reason: ${REASON}"
            if [ "$STATUS" = "True" ] && [ "$REASON" = "SecretSynced" ]; then
              echo "Secret synced successfully"
              break
            fi
            sleep 2
          done

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/kortix-api -n kortix

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/kortix-api \
            -n kortix \
            --timeout=300s

      - name: Verify health
        run: |
          INGRESS_HOST=$(kubectl get ingress kortix-api-ingress \
            -n kortix \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          for i in $(seq 1 15); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
              "https://${INGRESS_HOST}/v1/health" \
              -H "Host: new-api.kortix.com" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/15 - status: ${STATUS}"
            sleep 5
          done
          echo "Health check failed"
          exit 1
