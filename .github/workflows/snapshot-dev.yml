name: Build Dev Snapshot

# Separate from deploy-dev.yml so it doesn't block the main pipeline.
# Triggers when core/ changes on main, or manually.

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image tag to snapshot (default: dev-latest)'
        required: false
        default: dev-latest

concurrency:
  group: snapshot-dev
  cancel-in-progress: true

jobs:
  build-snapshot:
    name: Build dev snapshot
    uses: ./.github/workflows/build-snapshot.yml
    with:
      version: ${{ inputs.version || 'dev-latest' }}
      target: dev
    secrets: inherit
