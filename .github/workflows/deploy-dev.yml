name: Deploy Dev

# Builds multi-arch Docker images using native runners (amd64 + arm64 in parallel),
# deploys API to dev VPS. Path-filtered — only builds what changed.
#
# Auto-deploy on push is controlled by the repo variable AUTO_DEPLOY_DEV.
# Set to 'true' to enable, anything else to disable. Manual dispatch always works.

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'core/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── Gate: skip on push if auto-deploy is off ─────────────────────────────
  gate:
    name: Check auto-deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.AUTO_DEPLOY_DEV == 'true'
    steps:
      - run: echo "Auto-deploy enabled or manual trigger"

  # ── Detect what changed ──────────────────────────────────────────────────
  detect-changes:
    name: Detect changes
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.filter.outputs.api }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      computer_changed: ${{ steps.filter.outputs.computer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            frontend:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
            computer:
              - 'core/**'
      - name: Summary
        run: |
          echo "### Changes detected" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: ${{ steps.filter.outputs.api }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: ${{ steps.filter.outputs.frontend }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Computer: ${{ steps.filter.outputs.computer }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Build API (amd64 + arm64 in parallel) ──────────────────────────────────
  build-api-amd64:
    name: API (amd64)
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file apps/api/Dockerfile --build-arg SERVICE=apps/api \
            --tag "kortix/kortix-api:dev-${SHA8}-amd64" \
            --tag "kortix/kortix-api:dev-latest-amd64" .
          docker push "kortix/kortix-api:dev-${SHA8}-amd64"
          docker push "kortix/kortix-api:dev-latest-amd64"

  build-api-arm64:
    name: API (arm64)
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file apps/api/Dockerfile --build-arg SERVICE=apps/api \
            --tag "kortix/kortix-api:dev-${SHA8}-arm64" \
            --tag "kortix/kortix-api:dev-latest-arm64" .
          docker push "kortix/kortix-api:dev-${SHA8}-arm64"
          docker push "kortix/kortix-api:dev-latest-arm64"

  merge-api:
    name: API manifest
    needs: [build-api-amd64, build-api-arm64]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest
        id: meta
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker manifest create "kortix/kortix-api:dev-${SHA8}" \
            "kortix/kortix-api:dev-${SHA8}-amd64" \
            "kortix/kortix-api:dev-${SHA8}-arm64"
          docker manifest push "kortix/kortix-api:dev-${SHA8}"

          docker manifest create "kortix/kortix-api:dev-latest" \
            "kortix/kortix-api:dev-latest-amd64" \
            "kortix/kortix-api:dev-latest-arm64"
          docker manifest push "kortix/kortix-api:dev-latest"

          echo "image=kortix/kortix-api:dev-${SHA8}" >> "$GITHUB_OUTPUT"

  # ── Build Frontend (amd64 + arm64 in parallel) ─────────────────────────────
  build-frontend-amd64:
    name: Frontend (amd64)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./apps/web build
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file apps/web/Dockerfile \
            --tag "kortix/kortix-frontend:dev-${SHA8}-amd64" \
            --tag "kortix/kortix-frontend:dev-latest-amd64" .
          docker push "kortix/kortix-frontend:dev-${SHA8}-amd64"
          docker push "kortix/kortix-frontend:dev-latest-amd64"

  build-frontend-arm64:
    name: Frontend (arm64)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./apps/web build
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file apps/web/Dockerfile \
            --tag "kortix/kortix-frontend:dev-${SHA8}-arm64" \
            --tag "kortix/kortix-frontend:dev-latest-arm64" .
          docker push "kortix/kortix-frontend:dev-${SHA8}-arm64"
          docker push "kortix/kortix-frontend:dev-latest-arm64"

  merge-frontend:
    name: Frontend manifest
    needs: [build-frontend-amd64, build-frontend-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker manifest create "kortix/kortix-frontend:dev-${SHA8}" \
            "kortix/kortix-frontend:dev-${SHA8}-amd64" \
            "kortix/kortix-frontend:dev-${SHA8}-arm64"
          docker manifest push "kortix/kortix-frontend:dev-${SHA8}"

          docker manifest create "kortix/kortix-frontend:dev-latest" \
            "kortix/kortix-frontend:dev-latest-amd64" \
            "kortix/kortix-frontend:dev-latest-arm64"
          docker manifest push "kortix/kortix-frontend:dev-latest"

  # ── Build Computer (amd64 + arm64 in parallel) ────────────────────────────
  build-computer-amd64:
    name: Computer (amd64)
    needs: detect-changes
    if: needs.detect-changes.outputs.computer_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file core/docker/Dockerfile \
            --tag "kortix/computer:dev-${SHA8}-amd64" \
            --tag "kortix/computer:dev-latest-amd64" .
          docker push "kortix/computer:dev-${SHA8}-amd64"
          docker push "kortix/computer:dev-latest-amd64"

  build-computer-arm64:
    name: Computer (arm64)
    needs: detect-changes
    if: needs.detect-changes.outputs.computer_changed == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker build --file core/docker/Dockerfile \
            --tag "kortix/computer:dev-${SHA8}-arm64" \
            --tag "kortix/computer:dev-latest-arm64" .
          docker push "kortix/computer:dev-${SHA8}-arm64"
          docker push "kortix/computer:dev-latest-arm64"

  merge-computer:
    name: Computer manifest
    needs: [build-computer-amd64, build-computer-arm64]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest
        id: meta
        run: |
          SHA8="${GITHUB_SHA::8}"
          docker manifest create "kortix/computer:dev-${SHA8}" \
            "kortix/computer:dev-${SHA8}-amd64" \
            "kortix/computer:dev-${SHA8}-arm64"
          docker manifest push "kortix/computer:dev-${SHA8}"

          docker manifest create "kortix/computer:dev-latest" \
            "kortix/computer:dev-latest-amd64" \
            "kortix/computer:dev-latest-arm64"
          docker manifest push "kortix/computer:dev-latest"

          echo "tag=dev-${SHA8}" >> "$GITHUB_OUTPUT"

  # ── Deploy API to dev VPS ──────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to dev
    needs: merge-api
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Zero-downtime deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.AWS_DEV_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            cd ~/suna
            git -c fetch.recurseSubmodules=false fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive --remote
            PREBUILT_IMAGE="${{ needs.merge-api.outputs.image }}" bash scripts/deploy-zero-downtime.sh

      - name: Summary
        if: always()
        run: |
          echo "### Deployed API → **dev**" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ needs.merge-api.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Async: Fire off dev snapshot in a separate workflow run ─────────────
  # Uses gh workflow run (workflow_dispatch) to trigger a standalone
  # snapshot-build.yml run. This job completes in ~1 second — the snapshot
  # builds independently in its own run, not blocking deploy-dev.
  #
  # Fires on every deploy-dev run by default. Disable by setting the repo
  # variable AUTO_SNAPSHOT_DEV to 'false'.
  trigger-dev-snapshot:
    name: Trigger dev snapshot (async)
    needs: merge-computer
    runs-on: ubuntu-latest
    if: vars.AUTO_SNAPSHOT_DEV != 'false'
    steps:
      - name: Dispatch snapshot-build workflow
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          SHA8="${GITHUB_SHA::8}"
          gh workflow run snapshot-build.yml \
            --repo ${{ github.repository }} \
            --ref main \
            -f version="dev-${SHA8}" \
            -f target=dev
          echo "### Dev snapshot dispatched (async)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`dev-${SHA8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: **dev**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runs separately — deploy-dev is not blocked" >> "$GITHUB_STEP_SUMMARY"
