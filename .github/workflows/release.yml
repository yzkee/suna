name: Release Version

# Manual trigger — promotes current dev images to production.
# Re-tags dev-latest multi-arch manifests as versioned (no rebuild).
# Deploys to prod VPS, fast-forwards production branch (Vercel), creates GitHub Release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.8.29)'
        required: true
        type: string
      title:
        description: 'Release title (e.g. "Streaming fixes, new onboarding")'
        required: true
        type: string
      description:
        description: 'Release description (optional, multi-line)'
        required: false
        type: string

concurrency:
  group: release-prod
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ inputs.version }}
  TITLE: ${{ inputs.title }}

jobs:
  # ── Re-tag dev images as versioned (no rebuild) ────────────────────────────
  retag-images:
    name: Re-tag dev → v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Re-tag all images
        run: |
          for IMAGE in kortix/kortix-api kortix/kortix-frontend kortix/computer; do
            echo "Re-tagging $IMAGE:dev-latest → $IMAGE:${{ env.VERSION }} + $IMAGE:latest"

            # Use buildx imagetools to create new tags from existing multi-arch manifest
            docker buildx imagetools create \
              --tag "$IMAGE:${{ env.VERSION }}" \
              --tag "$IMAGE:latest" \
              "$IMAGE:dev-latest"

            echo "✓ $IMAGE:${{ env.VERSION }}"
          done

      - name: Summary
        run: |
          echo "### Re-tagged dev-latest → v${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`kortix/kortix-api:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`kortix/kortix-frontend:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`kortix/computer:${{ env.VERSION }}\` (multi-arch)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Zero rebuilds — re-tagged from dev-latest manifests._" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy API to prod VPS ─────────────────────────────────────────────────
  deploy-prod:
    name: Deploy API to prod
    needs: retag-images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -e
            if [ ! -d ~/suna ]; then
              git clone https://github.com/kortix-ai/suna.git ~/suna
            fi
            cd ~/suna
            git -c fetch.recurseSubmodules=false fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive --remote
            PREBUILT_IMAGE="kortix/kortix-api:${{ env.VERSION }}" bash scripts/deploy-zero-downtime.sh

      - name: Summary
        run: |
          echo "### Deployed API v${{ env.VERSION }} → **prod**" >> "$GITHUB_STEP_SUMMARY"

  # ── Fast-forward production branch (Vercel) ────────────────────────────────
  update-production-branch:
    name: Update production branch (Vercel)
    needs: retag-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Need a PAT with `workflow` scope to push workflow file changes
          # to the production branch (GITHUB_TOKEN cannot modify .github/workflows/*)
          token: ${{ secrets.GH_RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Fast-forward production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout production
          git merge --ff-only origin/main
          git push origin production
          echo "### Production branch fast-forwarded → Vercel deploys kortix.com" >> "$GITHUB_STEP_SUMMARY"

  # ── Create Git tag + GitHub Release ────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [deploy-prod, update-production-branch]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          {
            echo "## v${{ env.VERSION }} — ${{ env.TITLE }}"
            echo ""
            if [ -n "${{ inputs.description }}" ]; then
              echo "${{ inputs.description }}"
              echo ""
            fi
            echo "### Changes"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "### Docker Images"
            echo ""
            echo "- \`kortix/computer:${{ env.VERSION }}\`"
            echo "- \`kortix/kortix-api:${{ env.VERSION }}\`"
            echo "- \`kortix/kortix-frontend:${{ env.VERSION }}\`"
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }} — ${{ env.TITLE }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }} — ${{ env.TITLE }}" \
            --notes-file /tmp/release-notes.md \
            --repo kortix-ai/suna
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Async: Build prod JustAVPS snapshot ────────────────────────────────────
  build-prod-snapshot:
    name: Build prod snapshot (async)
    needs: retag-images
    uses: ./.github/workflows/build-snapshot.yml
    with:
      version: ${{ inputs.version }}
      target: prod
    secrets: inherit
