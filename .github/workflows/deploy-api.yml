name: Deploy kortix-api

on:
  push:
    branches: [main]
    paths:
      - 'services/kortix-api/**'
      - 'services/Dockerfile'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e

            cd ~/computer
            git fetch origin main
            git reset --hard origin/main

            docker compose --profile backend build --no-cache
            docker compose --profile backend up -d --force-recreate --remove-orphans

            for i in $(seq 1 15); do
              if curl -sf http://localhost:8008/v1/health > /dev/null 2>&1; then
                echo "Healthy after ${i}s"
                break
              fi
              [ "$i" -eq 15 ] && echo "Health check failed" && exit 1
              sleep 1
            done

            docker image prune -af --filter "until=24h" || true
            docker compose --profile backend ps
