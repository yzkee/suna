name: Deploy kortix-api

on:
  push:
    branches: [main]
    paths:
      - 'kortix-api/**'
      - 'scripts/compose/**'
      - 'scripts/deploy-zero-downtime.sh'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  group: deploy-api-${{ inputs.target || 'dev' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.target || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'dev' }}
    steps:
      - name: Zero-downtime deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -e
            cd ~/computer
            # Pull latest (the deploy script also does this, but we need it
            # to exist on disk before we can run it for the first time)
            git -c fetch.recurseSubmodules=false fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive --remote
            # Run zero-downtime deploy
            bash scripts/deploy-zero-downtime.sh

      - name: Deploy prod frontend (Vercel)
        if: inputs.target == 'prod'
        run: |
          curl -s -X POST "${{ secrets.VERCEL_PROD_DEPLOY_HOOK }}" | head -1
          echo "Triggered Vercel prod frontend deploy"

      - name: Summary
        if: always()
        run: |
          echo "### Deployed \`main\` → **${{ inputs.target || 'dev' }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
