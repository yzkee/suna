name: Deploy kortix-api

on:
  push:
    branches: [staging]
    paths:
      - 'kortix-api/**'
      - 'kortix-api/Dockerfile'
      - 'scripts/compose/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_PRODUCTION_HOST }}
          username: ${{ secrets.AWS_PRODUCTION_USERNAME }}
          key: ${{ secrets.AWS_PRODUCTION_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e

            cd ~/computer
            git fetch origin main
            git reset --hard origin/main
            git submodule update --init --recursive

            # Stop and remove old containers first to avoid name conflicts
            docker compose --project-directory . -f scripts/compose/docker-compose.yml --profile backend down --remove-orphans || true
            docker compose --project-directory . -f scripts/compose/docker-compose.yml --profile backend build --no-cache
            docker compose --project-directory . -f scripts/compose/docker-compose.yml --profile backend up -d

            for i in $(seq 1 15); do
              if curl -sf http://localhost:8008/v1/health > /dev/null 2>&1; then
                echo "Healthy after ${i}s"
                break
              fi
              [ "$i" -eq 15 ] && echo "Health check failed" && exit 1
              sleep 1
            done

            docker image prune -af --filter "until=24h" || true
            docker compose --project-directory . -f scripts/compose/docker-compose.yml --profile backend ps
