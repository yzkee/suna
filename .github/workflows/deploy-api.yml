name: Deploy kortix-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'scripts/compose/**'
      - 'scripts/deploy-zero-downtime.sh'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  group: deploy-api-${{ inputs.target || 'dev' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          IMAGE="ghcr.io/kortix-ai/kortix-api:${GITHUB_SHA::8}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE"

      - name: Build and push
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --build-arg SERVICE=kortix-api \
            --tag "${{ steps.meta.outputs.image }}" \
            --tag "ghcr.io/kortix-ai/kortix-api:latest" \
            .
          docker push "${{ steps.meta.outputs.image }}"
          docker push "ghcr.io/kortix-ai/kortix-api:latest"

  deploy:
    name: Deploy to ${{ inputs.target || 'dev' }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'dev' }}
    steps:
      - name: Zero-downtime deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -e
            cd ~/computer
            git -c fetch.recurseSubmodules=false fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive --remote
            PREBUILT_IMAGE="${{ needs.build.outputs.image }}" bash scripts/deploy-zero-downtime.sh

      - name: Deploy prod frontend (Vercel)
        if: inputs.target == 'prod'
        run: |
          curl -s -X POST "${{ secrets.VERCEL_PROD_DEPLOY_HOOK }}" | head -1
          echo "Triggered Vercel prod frontend deploy"

      - name: Summary
        if: always()
        run: |
          echo "### Deployed \`main\` → **${{ inputs.target || 'dev' }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ needs.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
