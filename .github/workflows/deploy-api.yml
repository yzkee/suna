name: Deploy kortix-api

on:
  push:
    branches: [main]
    paths:
      - 'services/kortix-api/**'
      - 'services/Dockerfile'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch: # manual trigger

permissions:
  contents: read

env:
  IMAGE: kortixmarko/kortix-api

jobs:
  # ─── Build & Push ──────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "$GITHUB_SHA" | head -c 7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "tags=${{ env.IMAGE }}:latest,${{ env.IMAGE }}:$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/Dockerfile
          build-args: SERVICE=kortix-api
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e

            echo "--- Pulling latest code ---"
            cd ~/kortix
            git fetch origin main
            git reset --hard origin/main

            echo "--- Pulling new image ---"
            docker compose --profile backend pull

            echo "--- Restarting service ---"
            docker compose --profile backend up -d --force-recreate --remove-orphans

            echo "--- Waiting for health check ---"
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8008/v1/health > /dev/null 2>&1; then
                echo "--- Healthy after ${i}s ---"
                break
              fi
              [ "$i" -eq 15 ] && echo "WARNING: health check not passing after 15s" && exit 1
              sleep 1
            done

            echo "--- Pruning old images ---"
            docker image prune -af --filter "until=24h" || true

            echo "--- Done ---"
            docker compose --profile backend ps
