name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: us-west-2
  GHCR_IMAGE: ghcr.io/kortix-ai/computer
  EKS_CLUSTER: kortix-prod

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::8}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/Dockerfile
          push: true
          build-args: SERVICE=kortix-api
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/kortix-api \
            -n kortix \
            kortix-api=${{ env.GHCR_IMAGE }}:${{ needs.build.outputs.image_tag }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/kortix-api \
            -n kortix \
            --timeout=300s

      - name: Verify health
        run: |
          INGRESS_HOST=$(kubectl get ingress kortix-api-ingress \
            -n kortix \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB DNS: ${INGRESS_HOST}"

          for i in $(seq 1 30); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
              "https://${INGRESS_HOST}/v1/health" \
              -H "Host: api.kortix.com" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/30 - status: ${STATUS}"
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          exit 1
