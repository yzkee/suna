name: Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: us-west-2
  GHCR_IMAGE: ghcr.io/kortix-ai/suna
  EKS_CLUSTER: kortix-prod

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::8}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/Dockerfile
          push: true
          build-args: SERVICE=kortix-api
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install infra dependencies
        working-directory: infra/prod
        run: npm ci

      - name: Pulumi up
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: prod
          work-dir: infra/prod
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG: >-
            kortix-eks:imageTag=${{ needs.build.outputs.image_tag }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/kortix-api \
            -n kortix \
            --timeout=300s

      - name: Verify health
        run: |
          INGRESS_HOST=$(kubectl get ingress kortix-api-ingress \
            -n kortix \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB DNS: ${INGRESS_HOST}"

          for i in $(seq 1 30); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
              "https://${INGRESS_HOST}/v1/health" \
              -H "Host: api.kortix.com" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/30 - status: ${STATUS}"
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          exit 1
