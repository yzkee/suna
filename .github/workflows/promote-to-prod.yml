name: Promote to Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: false

      - name: Sync submodules to tracked remote branch
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          IMAGE="ghcr.io/kortix-ai/suna-api:prod-${GITHUB_SHA::8}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE"

      - name: Build and push
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --build-arg SERVICE=apps/api \
            --tag "${{ steps.meta.outputs.image }}" \
            --tag "ghcr.io/kortix-ai/suna-api:prod-latest" \
            .
          docker push "${{ steps.meta.outputs.image }}"
          docker push "ghcr.io/kortix-ai/suna-api:prod-latest"

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Zero-downtime deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME || 'ubuntu' }}
          key: ${{ secrets.PROD_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -e
            if [ ! -d ~/suna ]; then
              git clone https://github.com/kortix-ai/suna.git ~/suna
            fi
            cd ~/suna
            git -c fetch.recurseSubmodules=false fetch origin main
            git reset --hard origin/main
            git submodule sync --recursive
            git submodule update --init --recursive --remote
            PREBUILT_IMAGE="${{ needs.build.outputs.image }}" bash scripts/deploy-zero-downtime.sh

      - name: Fast-forward production to main
        run: |
          git fetch origin main production
          git checkout production
          git merge --ff-only origin/main
          git push origin production

      - name: Summary
        if: always()
        run: |
          echo "### Promoted \`main\` → **PRODUCTION**" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ needs.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
