name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    name: Promote main → production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Push to production branch
        run: git push origin main:production --force

      - name: Summary
        run: |
          echo "### Promoted \`main\` → \`production\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
