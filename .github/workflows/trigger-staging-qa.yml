name: Trigger Staging QA

on:
  push:
    branches: [main]

concurrency:
  group: trigger-staging-qa-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    name: Send staging QA hook
    runs-on: ubuntu-latest
    steps:
      - name: Build hook payload
        env:
          EVENT_PATH: ${{ github.event_path }}
          BRANCH_NAME: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          jq -c \
            --arg branch "$BRANCH_NAME" \
            --arg commit_sha "${HEAD_SHA:0:7}" \
            '{
              commits: ((.commits // []) | (if length > 8 then .[-8:] else . end) | map({
                message: .message,
                author: .author.name,
                sha: (.id[0:7])
              })),
              commit_sha: $commit_sha,
              branch: $branch
            }' \
            "$EVENT_PATH" > payload.json

          printf 'Payload:\n'
          cat payload.json

      - name: POST to staging QA hook
        env:
          QA_STAGING_HOOK_URL: ${{ secrets.QA_STAGING_HOOK_URL }}
          QA_STAGING_KORTIX_TOKEN: ${{ secrets.QA_STAGING_KORTIX_TOKEN }}
          QA_STAGING_TRIGGER_SECRET: ${{ secrets.QA_STAGING_TRIGGER_SECRET }}
        run: |
          set -euo pipefail

          curl --fail-with-body --silent --show-error \
            -X POST "$QA_STAGING_HOOK_URL" \
            -H "X-Kortix-Token: $QA_STAGING_KORTIX_TOKEN" \
            -H "x-kortix-trigger-secret: $QA_STAGING_TRIGGER_SECRET" \
            -H "Content-Type: application/json" \
            --data @payload.json

      - name: Summary
        if: always()
        run: |
          echo '### Triggered staging QA hook' >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \\`$GITHUB_REF_NAME\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Head SHA: \\`${GITHUB_SHA:0:7}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo 'Included commits: last 8 from this push event' >> "$GITHUB_STEP_SUMMARY"
