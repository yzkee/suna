name: Build Snapshot

# Single workflow that builds JustAVPS snapshots for either the dev or prod org.
# Triggered three ways:
#   1. Manual dispatch — pick version + target (dev/prod)
#   2. workflow_call — called by release.yml with target=prod
#   3. Push to core/** — auto-builds dev snapshot (if AUTO_SNAPSHOT_DEV=true)

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version (e.g. 0.8.30 or dev-abc12345 or dev-latest)'
        required: true
        default: dev-latest
      target:
        description: 'Target environment'
        type: choice
        options:
          - dev
          - prod
        default: dev

  workflow_call:
    inputs:
      version:
        description: 'Docker image version'
        required: true
        type: string
      target:
        description: 'Target environment (dev or prod)'
        required: false
        type: string
        default: dev

concurrency:
  group: snapshot-build-${{ inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  gate:
    name: Check auto-snapshot
    runs-on: ubuntu-latest
    # Push: only run if AUTO_SNAPSHOT_DEV=true. Manual/call: always run.
    if: github.event_name != 'push' || vars.AUTO_SNAPSHOT_DEV == 'true'
    steps:
      - name: Proceeding
        run: echo "trigger=${{ github.event_name }} target=${{ inputs.target || 'dev' }}"

  build-snapshot:
    name: Build snapshot (${{ inputs.target || 'dev' }})
    needs: gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'dev' }}
    timeout-minutes: 30
    env:
      API_URL: ${{ secrets.JUSTAVPS_API_URL || 'https://justavps.com/api/v1' }}
      API_KEY: ${{ secrets.JUSTAVPS_API_KEY }}
    steps:
      - name: Resolve version
        id: v
        run: |
          # Push events don't have inputs — default to dev-latest/dev
          V="${{ inputs.version || 'dev-latest' }}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "image=kortix/computer:$V" >> "$GITHUB_OUTPUT"
          echo "snapshot=kortix-computer-v$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Create builder machine
        id: machine
        run: |
          STARTUP=$(cat <<'SCRIPT'
          #!/bin/bash
          set -e
          curl -fsSL https://raw.githubusercontent.com/kortix-ai/suna/main/scripts/start-sandbox.sh -o /tmp/start-sandbox.sh
          chmod +x /tmp/start-sandbox.sh
          /tmp/start-sandbox.sh '${{ steps.v.outputs.image }}'
          SCRIPT
          )

          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            "$API_URL/machines" \
            -d "$(jq -n \
              --arg st "starter" \
              --arg rg "nbg1" \
              --arg ci "$STARTUP" \
              --arg nm "snapshot-builder-$(date +%s)" \
              '{server_type: $st, region: $rg, startup_script: $ci, name: $nm}')")

          MACHINE_ID=$(echo "$RESP" | jq -r '.id')
          if [ -z "$MACHINE_ID" ] || [ "$MACHINE_ID" = "null" ]; then
            echo "Failed to create machine: $RESP"
            exit 1
          fi
          echo "id=$MACHINE_ID" >> "$GITHUB_OUTPUT"
          echo "Machine: $MACHINE_ID"

      - name: Wait for machine ready
        run: |
          DEADLINE=$((SECONDS + 600))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATUS=$(curl -sf -H "Authorization: Bearer $API_KEY" \
              "$API_URL/machines/${{ steps.machine.outputs.id }}" | jq -r '.status')

            if [ "$STATUS" = "ready" ]; then
              echo "Machine ready (${SECONDS}s)"
              exit 0
            fi
            if [ "$STATUS" = "error" ] || [ "$STATUS" = "deleted" ]; then
              echo "Machine failed: $STATUS"
              exit 1
            fi
            echo "Status: $STATUS (${SECONDS}s)"
            sleep 10
          done
          echo "Timeout waiting for machine"
          exit 1

      - name: Wait for Docker pull to complete
        run: |
          # The startup_script pulls the Docker image and starts the container.
          # Machine "ready" only means the JustAVPS daemon is up — the Docker pull
          # may still be running. Poll the machine health until disk usage stabilizes
          # (image downloaded) or fall back to a generous fixed wait.
          echo "Waiting for Docker image pull to complete..."
          PREV_DISK=""
          STABLE_COUNT=0
          DEADLINE=$((SECONDS + 480))
          while [ $SECONDS -lt $DEADLINE ]; do
            DISK=$(curl -sf -H "Authorization: Bearer $API_KEY" \
              "$API_URL/machines/${{ steps.machine.outputs.id }}" \
              | jq -r '.health.disk // empty')

            if [ -n "$DISK" ] && [ "$DISK" = "$PREV_DISK" ]; then
              STABLE_COUNT=$((STABLE_COUNT + 1))
            else
              STABLE_COUNT=0
            fi
            PREV_DISK="$DISK"

            echo "Disk: $DISK (stable for ${STABLE_COUNT} checks, ${SECONDS}s)"

            # Disk usage stable for 6 consecutive checks (60s) means pull is done
            if [ "$STABLE_COUNT" -ge 6 ]; then
              echo "Disk stable — Docker pull complete (${SECONDS}s)"
              # Extra 30s buffer for container startup + health check
              sleep 30
              exit 0
            fi
            sleep 10
          done
          echo "Warning: timed out waiting for stable disk, proceeding anyway"

      - name: Create snapshot
        id: snapshot
        run: |
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            "$API_URL/machines/${{ steps.machine.outputs.id }}/image" \
            -d '{"name": "${{ steps.v.outputs.snapshot }}"}')

          IMAGE_ID=$(echo "$RESP" | jq -r '.id')
          if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
            echo "Failed to create snapshot: $RESP"
            exit 1
          fi
          echo "id=$IMAGE_ID" >> "$GITHUB_OUTPUT"
          echo "Snapshot ID: $IMAGE_ID"

          DEADLINE=$((SECONDS + 900))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATUS=$(curl -sf -H "Authorization: Bearer $API_KEY" \
              "$API_URL/images/$IMAGE_ID" | jq -r '.status')

            if [ "$STATUS" = "ready" ]; then
              echo "Snapshot ready (${SECONDS}s)"
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then
              DESC=$(curl -sf -H "Authorization: Bearer $API_KEY" \
                "$API_URL/images/$IMAGE_ID" | jq -r '.description // "unknown"')
              echo "Snapshot failed: $DESC"
              exit 1
            fi
            echo "Snapshot: $STATUS (${SECONDS}s)"
            sleep 10
          done
          echo "Timeout waiting for snapshot"
          exit 1

      - name: Delete builder machine
        if: always() && steps.machine.outputs.id
        run: |
          curl -sf -X DELETE \
            -H "Authorization: Bearer $API_KEY" \
            "$API_URL/machines/${{ steps.machine.outputs.id }}" || true
          echo "Builder machine deleted"

      - name: Summary
        if: always()
        run: |
          echo "### Snapshot: \`${{ steps.v.outputs.snapshot }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: **${{ inputs.target || 'dev' }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker image: \`${{ steps.v.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- JustAVPS image ID: \`${{ steps.snapshot.outputs.id || 'N/A' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Builder machine: \`${{ steps.machine.outputs.id || 'N/A' }}\`" >> "$GITHUB_STEP_SUMMARY"
