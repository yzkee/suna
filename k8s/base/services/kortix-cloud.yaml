apiVersion: apps/v1
kind: Deployment
metadata:
  name: kortix-cloud
  labels:
    app: kortix-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kortix-cloud
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kortix-cloud
    spec:
      containers:
        - name: kortix-cloud
          image: kortix/kortix-cloud:latest
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: kortix-cloud-config
                optional: true
            - secretRef:
                name: kortix-cloud-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kortix-cloud
  labels:
    app: kortix-cloud
spec:
  type: ClusterIP
  selector:
    app: kortix-cloud
  ports:
    - port: 8010
      targetPort: 8010
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kortix-cloud
  labels:
    app: kortix-cloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kortix-cloud
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
