apiVersion: apps/v1
kind: Deployment
metadata:
  name: kortix-billing
  labels:
    app: kortix-billing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kortix-billing
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kortix-billing
    spec:
      containers:
        - name: kortix-billing
          image: kortix/kortix-billing:latest
          ports:
            - containerPort: 8013
          envFrom:
            - configMapRef:
                name: kortix-billing-config
                optional: true
            - secretRef:
                name: kortix-billing-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8013
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8013
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kortix-billing
  labels:
    app: kortix-billing
spec:
  type: ClusterIP
  selector:
    app: kortix-billing
  ports:
    - port: 8013
      targetPort: 8013
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kortix-billing
  labels:
    app: kortix-billing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kortix-billing
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
