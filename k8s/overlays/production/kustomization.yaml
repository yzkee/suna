apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: production
    includeSelectors: true

patches:
  # Production: 2+ replicas per service, production image tags
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/frontend:production
  - target:
      kind: Deployment
      name: kortix-router
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-router:production
  - target:
      kind: Deployment
      name: kortix-auth
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-auth:production
  - target:
      kind: Deployment
      name: kortix-billing
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-billing:production
  - target:
      kind: Deployment
      name: kortix-cloud
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-cloud:production
  - target:
      kind: Deployment
      name: kortix-cron
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-cron:production
  - target:
      kind: Deployment
      name: kortix-platform
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-platform:production
