apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: staging
    includeSelectors: true

patches:
  # Staging: 1 replica per service, staging image tags
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/frontend:staging
  - target:
      kind: Deployment
      name: kortix-router
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-router:staging
  - target:
      kind: Deployment
      name: kortix-auth
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-auth:staging
  - target:
      kind: Deployment
      name: kortix-billing
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-billing:staging
  - target:
      kind: Deployment
      name: kortix-cloud
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-cloud:staging
  - target:
      kind: Deployment
      name: kortix-cron
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-cron:staging
  - target:
      kind: Deployment
      name: kortix-platform
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kortix/kortix-platform:staging
